// ── Q56 ──
{id:56,type:'mcq',difficulty:'easy',topic:'Money Market vs Capital Market',page:'p.57',
text:'What is the PRIMARY distinction between money market instruments and capital market instruments?',
options:['Money market instruments are government-issued; capital market instruments are corporate-issued','Money market instruments mature within one year; capital market instruments have remaining maturities beyond one year','Money market instruments pay coupons; capital market instruments are zero-coupon','Money market instruments are non-negotiable; capital market instruments are negotiable'],
correct:1,
hint:'It\'s all about time to maturity.',
explanation:'The defining classification is maturity: money market instruments = mature within 1 year (low risk, high liquidity); capital market instruments = maturities beyond 1 year (higher expected return, capital gains potential, more risk).',
optionExplains:['Wrong. Both governments and corporations issue instruments in both markets.','CORRECT. Maturity horizon is the defining criterion: ≤1 year = money market; >1 year = capital market.','Wrong. Both markets include coupon and zero-coupon instruments.','Wrong. Negotiability varies within each market; it is not the defining distinction.'],
trap:'Short-term T-notes (near their maturity) are classified as money market instruments — it\'s about REMAINING maturity, not original maturity.'},

// ── Q57 ──
{id:57,type:'mcq',difficulty:'medium',topic:'Money Market Instruments',page:'p.59',
text:'A bank-issued Certificate of Deposit (CD) with a denomination over $100,000 is typically called a:',
options:['Consumer CD','Jumbo or negotiable CD','Savings certificate','Euro CD'],
correct:1,
hint:'Large CDs have special market status and names.',
explanation:'CDs over $100,000 are called "jumbos" or "negotiable CDs." Security dealers provide a secondary market for these large CDs maturing within six months. They differ from smaller consumer-oriented CDs ($500–$100,000) in negotiability and secondary market treatment.',
optionExplains:['Wrong. Consumer CDs are the SMALL denominations ($500–$100,000).','CORRECT. $100,000+ CDs = jumbo or negotiable CDs with secondary market trading.','Wrong. "Savings certificate" is a generic term not specific to large CDs.','Wrong. Euro CDs are issued in the Eurocurrency market, not the domestic U.S. market.'],
trap:'Only the first $250,000 is FDIC-insured, even for jumbo CDs. The excess carries credit risk.'},

// ── Q58 ──
{id:58,type:'mcq',difficulty:'medium',topic:'Money Market Instruments',page:'p.59',
text:'Eurocurrency deposits are characterized by all of the following EXCEPT:',
options:['Typically 30, 60, or 90-day maturities','Issued in million-dollar units','FDIC-insured up to $250,000 per account','Carry slightly higher yields than comparable domestic U.S. bank deposits'],
correct:2,
hint:'Eurocurrency deposits are international — does FDIC apply?',
explanation:'Eurocurrency deposits are NOT FDIC-insured. They are time deposits issued by major international banks in financial centers globally (heart = London). Because they carry higher perceived credit risk (no insurance), they offer slightly higher yields than comparable domestic U.S. deposits.',
optionExplains:['Wrong. 30/60/90 days IS a characteristic of Eurocurrency deposits.','Wrong. Million-dollar units IS a characteristic.','CORRECT. NOT FDIC-insured — that\'s a domestic U.S. feature. This is what distinguishes them and justifies their higher yield.','Wrong. Higher yields than domestic CDs IS a characteristic due to uninsured credit risk.'],
trap:'The lack of FDIC insurance on Eurocurrency deposits is why they yield more than domestic deposits.'},

// ── Q59 ──
{id:59,type:'mcq',difficulty:'medium',topic:'Capital Market Instruments',page:'p.60',
text:'Why are corporate bonds generally MORE attractive to INSURANCE COMPANIES and PENSION FUNDS than to banks?',
options:['Insurance companies and pension funds are tax-exempt, making corporate bond income more valuable','Corporate bonds have higher credit risk and less liquidity, which suits the longer time horizons of insurers and pension funds','Banks are legally prohibited from holding corporate bonds','Corporate bonds offer negative duration which matches insurance liabilities'],
correct:1,
hint:'Think about who can absorb more risk and who has long-term liabilities to match.',
explanation:'Corporate bonds carry higher credit risk AND have more limited resale markets than government securities. Banks prioritize safety and liquidity (due to demand deposits). Insurers and pension funds have LONGER investment horizons and can accept more illiquidity and credit risk for the higher yields corporate bonds offer.',
optionExplains:['Partially relevant but not the primary structural reason.','CORRECT. Higher risk + lower liquidity suits long-horizon institutions, not short-horizon banks.','Wrong. Banks CAN hold corporate bonds (though preference is limited).','Wrong. Corporate bonds have positive duration; negative duration is not a relevant concept here.'],
trap:'Bank deposits are short-term liabilities → banks need liquid assets. Pension liabilities are long-term → can hold illiquid higher-yield assets.'},

// ── Q60 ──
{id:60,type:'mcq',difficulty:'hard',topic:'Structured Notes',page:'p.61',
text:'A structured note that pays interest ONLY if an agreed-upon market index stays within a specified range (e.g., 2%-4%) is called a:',
options:['CMO (Collateralized Mortgage Obligation)','Range note','Step-up bond','REMIC'],
correct:1,
hint:'The key feature is a conditional payout tied to whether a rate stays within a range.',
explanation:'Range notes are callable securities paying high coupon interest ONLY when a reference market index remains within a designated range. If the index moves outside the range, there is NO interest payment. This creates complex risk/return profiles.',
optionExplains:['Wrong. CMOs are mortgage-backed securities with tranches, not conditional coupon structures.','CORRECT. Range note = interest paid only if reference index stays within a specified band.','Wrong. Step-up bonds have periodically increasing coupons, not conditional range-based payments.','Wrong. REMICs are a type of mortgage-backed securitization structure.'],
trap:'Range notes seem to offer high yields but carry SIGNIFICANT interest rate risk — if rates move outside the range, investors earn zero.'},

// ── Q61 ──
{id:61,type:'mcq',difficulty:'hard',topic:'Structured Notes',page:'p.68',
text:'An equity-linked CD with a call option (bull CD) pays additional return when:',
options:['The reference stock index FALLS below the strike price','The reference stock index RISES above the strike price','Interest rates decline below the base CD rate','The issuing bank\'s credit rating improves'],
correct:1,
hint:'Call option = profits when underlying rises above the strike.',

// ── Q62 ──
{id:62,type:'truefalse',difficulty:'easy',topic:'Investment Portfolio Functions',page:'p.57',
text:'TRUE or FALSE: Investment securities are described as the "crossroads account" because they interact with cash, loans, and deposits on a bank\'s balance sheet.',
correct:true,
hint:'Think about how investments absorb excess cash or fund excess loan demand.',
explanation:'TRUE. Investments are called the crossroads account because they literally stand between cash, loans, and deposits: they absorb excess cash, are sold to fund loan demand, serve as collateral for nondeposit borrowings when deposits fall, and are replenished when deposits are growing. No other account has such broad interconnections.',
wrongPart:'Any FALSE answer misses the multi-directional balance sheet role of the investment portfolio.',
trap:'The "crossroads" metaphor captures the fact that investments are actively managed to balance ALL other balance sheet needs.'},

// ── Q63 ──
{id:63,type:'mcq',difficulty:'medium',topic:'Yield to Maturity',page:'p.65',
text:'A financial firm does not plan to hold an investment to maturity. Which yield measure should the investments officer calculate?',
options:['Yield to Maturity (YTM)','Tax-Equivalent Yield (TEY)','Holding Period Yield (HPY)','Bank Discount Yield (BDY)'],
correct:2,
hint:'The holding period ends at SALE, not maturity.',
explanation:'HPY (Holding Period Yield) measures the actual return between purchase and the planned sale date. Unlike YTM which assumes holding to maturity, HPY accounts for the capital gain or loss at the time of early sale and the coupons received during the holding period.',
optionExplains:['Wrong. YTM assumes the security is held to maturity — not appropriate for early-sale planning.','Wrong. TEY converts tax-exempt yields to taxable equivalents — a comparison tool.','CORRECT. HPY = return for actual holding period until planned sale.','Wrong. BDY is used for discount securities (T-bills); not the general yield for early-sale planning.'],
trap:'YTM is often discussed as the "the" yield of a bond, but it only applies if you hold to maturity.'},

// ── Q64 ──
{id:64,type:'mcq',difficulty:'hard',topic:'Municipal Bonds Tax',page:'p.60',
text:'Capital gains on municipal bonds are:',
options:['Fully tax-exempt, like interest income','Fully taxable, with one exception: bonds sold at a discount where price appreciation to par counts as part of tax-exempt interest','Taxable only at the state and local level','Tax-exempt only for bank-qualified bonds'],
correct:1,
hint:'Interest = exempt. Gains = usually taxable. But what is the exception?',
explanation:'On municipal bonds: INTEREST income is tax-exempt. CAPITAL GAINS are fully taxable — EXCEPT for bonds purchased at a discount, where the gain from purchase price to par value is treated as part of the tax-exempt interest income (not capital gain).',
optionExplains:['Wrong. Capital gains are NOT tax-exempt; only interest is.','CORRECT. Gains taxable, with the discount bond exception for the price-to-par appreciation.','Wrong. Capital gains on munis are federal taxable (the federal interest exemption doesn\'t apply to gains).','Wrong. Bank-qualified status affects interest expense deductibility, not capital gain tax treatment.'],
trap:'The critical distinction: muni INTEREST = tax-exempt. Muni CAPITAL GAINS = taxable (with the specific discount exception).'},

// ── Q65 ──
{id:65,type:'mcq',difficulty:'medium',topic:'Factors Affecting Investment Choice',page:'p.64',
text:'Why do banks generally prefer making LOANS over purchasing CORPORATE BONDS from the same borrower?',
options:['Corporate bonds offer lower yields than loans','Purchasing bonds generates no new deposits for the bank, while loans often bring new deposit relationships','Bonds have shorter maturities than business loans','Corporate bonds carry higher default risk than equivalent bank loans'],
correct:1,
hint:'Loans bring a customer relationship; bond purchases don\'t.',
explanation:'Banks prefer loans over bonds for two reasons: (1) direct loans often yield MORE than purchased securities, and (2) making loans typically GENERATES new deposit relationships and other business from borrowers. Bond purchases are purely arms-length transactions that generate no ancillary business.',
optionExplains:['Wrong. Loans typically yield MORE than comparable bonds, not less.','CORRECT. Loans bring deposits and relationships; bond purchases do not. Two advantages for loans.','Wrong. Banks make both short-term and long-term loans; maturity is not the issue.','Wrong. A bank lending to a company and buying that same company\'s bonds faces similar credit risk.'],
trap:'The relationship advantage of loans is as important as the yield advantage. Banks are relationship businesses.'},

// ── Q66 ──
{id:66,type:'mcq',difficulty:'medium',topic:'Investment Securities Held by Banks',page:'p.64',
text:'Most bank-held investment securities are classified as "available for sale" rather than "held to maturity." This primarily means:',
options:['The securities earn higher yields in the available-for-sale category','Management targets these investments for eventual resale to meet cash needs or capture opportunities','Available-for-sale securities are exempt from credit risk assessments','These securities are subject to more lenient accounting standards'],
correct:1,
hint:'Why would you classify something as "available for sale"?',
explanation:'"Available for sale" signals that management INTENDS to eventually sell these securities — to fund cash withdrawals, make loans, or capture better opportunities. In contrast, "held to maturity" means the firm commits to holding until maturity. >94% of bank investments were available for sale in 2010.',
optionExplains:['Wrong. Accounting classification doesn\'t directly affect yield.','CORRECT. Available for sale = intended for eventual sale when needed or opportunistic.','Wrong. All securities face credit risk assessments regardless of accounting classification.','Wrong. Available-for-sale securities must be marked to market through other comprehensive income — more discipline, not less.'],
trap:'Available for sale does NOT mean the bank is actively trading — it means the door is open for sale if needed.'},

// ── Q67 ──
{id:67,type:'truefalse',difficulty:'easy',topic:'Investment Portfolio Functions',page:'p.56',
text:'TRUE or FALSE: Investment securities typically represent over half of total bank assets.',
correct:false,
hint:'What is the approximate investment-to-total-assets ratio for banks?',
explanation:'FALSE. Investment securities represent only about ONE-FIFTH (roughly 19-20%) of total bank assets. Loans dominate, typically representing over HALF of all bank assets. Investments play an important but secondary role to lending in the balance sheet.',
wrongPart:'Any TRUE answer overestimates the relative importance of investment securities vs. loans.',
trap:'Investments = ~20% of assets. Loans = >50% of assets. Investments are important but NOT the largest asset category.'},

// ── Q68 ──
{id:68,type:'mcq',difficulty:'medium',topic:'Capital Market Instruments',page:'p.61',
text:'Which organization was primarily responsible for developing the Collateralized Mortgage Obligation (CMO) in 1983?',
options:['Fannie Mae (FNMA)','Ginnie Mae (GNMA)','Freddie Mac (FHLMC)','The Federal Reserve'],
correct:2,
hint:'One of the GSEs created this specific instrument.',
explanation:'Freddie Mac (Federal Home Loan Mortgage Corporation / FHLMC) developed the CMO in 1983. CMOs divide pass-through security cash flows into multiple tranches (classes) with different coupon rates and risk levels.',
optionExplains:['Wrong. Fannie Mae creates and guarantees pass-through securities.','Wrong. Ginnie Mae guarantees timely principal/interest on government-insured mortgage securities.','CORRECT. Freddie Mac developed CMOs in 1983 as a pass-through with multiple tranches.','Wrong. The Federal Reserve is not a mortgage securitization entity.'],
trap:'Know the three agencies: GNMA = government agency (guarantee); FNMA = pass-throughs; FHLMC = created CMOs.'},

// ── Q69 ──
{id:69,type:'mcq',difficulty:'hard',topic:'Securitized Assets',page:'p.62',
text:'REMICs (Real Estate Mortgage Investment Conduits) are MOST similar to:',
options:['Stripped securities (PO and IO)','CMOs — they partition mortgage cash flows into multiple maturity classes to reduce cash-flow uncertainty','Simple pass-through securities without tranching','Mortgage-backed bonds (MBBs) that stay on-balance-sheet'],
correct:1,
hint:'REMICs partition cash flows — sound familiar?',
explanation:'REMICs are closely related to CMOs. Both partition the cash flow from pools of mortgage loans or mortgage-backed securities into multiple maturity classes to reduce cash-flow uncertainty for investors. The key difference is tax treatment — REMICs have a specific favorable tax structure.',
optionExplains:['Wrong. Stripped securities separate P and I; REMICs partition by maturity/risk class.','CORRECT. REMICs are functionally similar to CMOs — partitioning cash flows into classes to reduce uncertainty.','Wrong. Simple pass-throughs have no tranching.','Wrong. MBBs stay on-balance-sheet; REMICs are securitizations.'],
trap:'REMIC ≈ CMO in structure. The distinction is primarily legal/tax treatment.'},

// ── Q70 ──
{id:70,type:'mcq',difficulty:'medium',topic:'Credit Risk',page:'p.69',
text:'Investments officers can use CREDIT OPTIONS to:',
options:['Replace all fixed-rate bonds with floating-rate instruments','Protect the market value of a bond if the issuer defaults or the credit rating is lowered','Eliminate prepayment risk from mortgage-backed securities','Convert taxable bond income into tax-exempt income'],
correct:1,
hint:'Options provide payoffs when bad things happen to credit quality.',
explanation:'Credit options provide a payoff when a bond issuer defaults OR when its credit rating is downgraded. This at least partially offsets the loss in market value suffered on the bond itself. Credit options are a hedging tool for credit risk in the investment portfolio.',
optionExplains:['Wrong. Converting fixed to floating uses interest rate swaps, not credit options.','CORRECT. Credit options hedge against default or rating downgrades — compensate for bond value losses.','Wrong. Prepayment risk is different from credit risk; different instruments address it.','Wrong. Tax conversion is not a function of credit options.'],
trap:'Credit options ≠ interest rate options. Credit options trigger on CREDIT EVENTS (default, downgrade), not rate moves.'},

// ── Q71 ──
{id:71,type:'mcq',difficulty:'easy',topic:'Capital Market Instruments',page:'p.60',
text:'Which type of municipal bond is backed by the full faith and credit of the issuing government, including its taxing power?',
options:['Revenue bond','General Obligation (GO) bond','Private activity bond','Industrial Development Bond (IDB)'],
correct:1,
hint:'"General Obligation" — what obligation does it place on the government?',
explanation:'GO bonds are backed by the full faith and credit of the issuing government — meaning the government can levy additional taxes if needed to repay bondholders. This is the strongest form of municipal bond security.',
optionExplains:['Wrong. Revenue bonds are payable ONLY from specific project revenues — weaker security.','CORRECT. GO bonds = full faith and credit = taxing power backstop = strongest municipal security.','Wrong. Private activity bonds lose tax exemption if too much benefit goes to private entities.','Wrong. IDBs are a type of revenue bond, not backed by full taxing power.'],
trap:'GO bonds = taxing power. Revenue bonds = project revenues only. GO bonds are generally SAFER than revenue bonds.'},

// ── Q72 ──
{id:72,type:'mcq',difficulty:'medium',topic:'Yield Curve',page:'p.76',
text:'A downward-sloping yield curve (inverted) signals:',
options:['The economy is in a strong expansion phase','Market expectations of DECLINING short-term interest rates in the future','Extremely high default risk in the bond market','An upcoming Federal Reserve rate hike'],
correct:1,
hint:'What do investors do when they expect falling rates? They lock in long-term yields.',
explanation:'A downward-sloping (inverted) yield curve reflects the market\'s expectation that short-term interest rates will DECLINE in the future. Investors buy long-term bonds aggressively (driving long yields down), while short-term rates remain elevated, causing the inversion. Inverted curves often precede recessions.',
optionExplains:['Wrong. Inverted yield curves typically signal economic slowdown, not expansion.','CORRECT. Inverted curve → market expects short rates to fall. Historically precedes recessions.','Wrong. The shape of the curve reflects rate expectations, not absolute default risk levels.','Wrong. An expected rate HIKE would push short rates UP (possibly steepening, not inverting, the curve).'],
trap:'Inverted yield curve = recession warning sign historically. Short > long yield = expectation of future rate cuts.'},

// ── Q73 ──
{id:73,type:'mcq',difficulty:'medium',topic:'Investment Portfolio Functions',page:'p.57',
text:'The investment portfolio helps "DRESS UP the balance sheet" by:',
options:['Recording investments at historical cost to avoid mark-to-market volatility','Holding high-quality marketable securities that make the institution look financially stronger','Structuring securities to reduce reported leverage ratios','Shifting loans off-balance-sheet through securitization'],
correct:1,
hint:'What does holding high-quality securities do for your balance sheet appearance?',
explanation:'"Dressing up the balance sheet" means that high-quality marketable securities (Treasuries, agencies) in the investment portfolio give external parties (regulators, analysts, depositors) confidence in the institution\'s financial strength and asset quality.',
optionExplains:['Wrong. Available-for-sale securities are marked to market — the function is visual, not accounting.','CORRECT. High-quality securities in the portfolio improve the perceived financial strength of the institution.','Wrong. Investment securities affect asset quality, not leverage ratios directly.','Wrong. Securitization removes assets from the balance sheet; investing keeps them on it.'],
trap:'"Dressing up" is a legitimate portfolio function — it uses investment quality to signal institutional strength.'},

// ── Q74 ──
{id:74,type:'mcq',difficulty:'medium',topic:'Expected Rate of Return',page:'p.65',
text:'An investments officer calculating YTM assumes which of the following?',
options:['The security will be sold halfway through its life','The security will be held to maturity AND all intermediate cash flows will be reinvested at the YTM rate','The coupon rate will change annually based on market rates','The investor will only hold the security for one year'],
correct:1,
hint:'YTM has an embedded assumption about reinvestment.',
explanation:'YTM implicitly assumes (1) the security is held to maturity and (2) all intermediate cash flows (coupons) are reinvested at the YTM rate. If reinvestment rates differ, realized return will differ from YTM. This is one of YTM\'s limitations.',
optionExplains:['Wrong. YTM assumes holding to FULL maturity, not halfway.','CORRECT. Hold to maturity + reinvest all coupons at YTM rate — the twin assumptions.','Wrong. YTM uses the PROMISED coupon, which is fixed.','Wrong. Holding for one year uses HPY, not YTM.'],
trap:'YTM is only realized if you hold to maturity AND reinvest at YTM. In practice, reinvestment rates vary, creating a gap.'},

// ── Q75 ──
{id:75,type:'mcq',difficulty:'hard',topic:'Tax Exposure',page:'p.67',
text:'In a PORTFOLIO SHIFTING strategy, a bank sells a $10M bond recorded at par but currently worth $9.5M, and purchases a new higher-yielding bond. What is the after-tax cost of this loss for a bank in the 35% tax bracket?',
options:['$500,000','$325,000','$175,000','$0 because the loss offsets future gains'],
correct:1,
hint:'After-tax loss = pre-tax loss × (1 – tax rate)',
explanation:'Pre-tax loss = $10M – $9.5M = $500,000. After-tax loss = $500,000 × (1 – 0.35) = $500,000 × 0.65 = $325,000. The tax system absorbs 35% of the loss, so the actual cost to the bank is $325,000.',
optionExplains:['Wrong. $500,000 is the PRE-TAX loss before tax benefit.','CORRECT. $500,000 × (1 – 0.35) = $325,000 after-tax loss.','Wrong. $175,000 = $500,000 × 0.35 = the TAX BENEFIT, not the after-tax loss.','Wrong. The loss is not zero — it reduces current earnings even if it generates tax savings.'],
trap:'After-tax loss = pre-tax loss × (1 – t). The tax benefit is the loss × t ($175,000), not the loss itself.'},

// ── Q76 ──
{id:76,type:'truefalse',difficulty:'medium',topic:'Credit Risk',page:'p.70',
text:'TRUE or FALSE: Unrated securities cannot be purchased by regulated banks under any circumstances.',
correct:false,
hint:'Regulations specify minimum quality, but unrated ≠ automatically prohibited.',
explanation:'FALSE. Unrated securities CAN be acquired by regulated institutions, BUT the institution must be able to DEMONSTRATE that the unrated security is of investment-grade quality. The burden of proof falls on the institution.',
wrongPart:'Any TRUE answer wrongly assumes unrated = prohibited. Unrated means you must justify the quality yourself.',
trap:'The rule is investment-grade quality, not investment-grade RATING. Demonstrable quality allows unrated security purchases.'},

// ── Q77 ──
{id:77,type:'mcq',difficulty:'medium',topic:'Factors Affecting Investment Choice',page:'p.71',
text:'The primary trade-off an investments officer faces between LIQUIDITY and PROFITABILITY in the securities portfolio is:',
options:['More liquid securities tend to offer higher yields than illiquid ones','More liquid securities (like Treasuries) tend to offer LOWER yields, reducing profitability; less liquid securities offer higher yields','Liquid securities are riskier and therefore more profitable','Government securities are always the most profitable choice'],
correct:1,
hint:'What premium do investors demand for giving up liquidity?',
explanation:'Liquid securities (Treasuries, agencies) offer lower yields because investors accept less return for liquidity. Illiquid securities (corporates, certain munis) offer higher yields as a liquidity premium. Holding more liquid assets = safer and more flexible but LESS profitable.',
optionExplains:['Wrong. Liquid securities yield LESS, not more.','CORRECT. Liquidity premium: hold more liquid → lower yield → lower profitability.','Wrong. Liquidity and risk are different dimensions — liquid securities are generally SAFER.','Wrong. Government securities offer safety and liquidity but NOT the highest yields.'],
trap:'The liquidity-profitability trade-off must be re-evaluated DAILY as market rates and liquidity risk change.'},

// ── Q78 ──
{id:78,type:'mcq',difficulty:'hard',topic:'Inflation Risk',page:'p.72',
text:'The spread between nominal Treasury bond yields and TIPS yields of the same maturity represents:',
options:['The default risk premium on Treasury bonds','The market\'s implied expectation of future inflation','The liquidity risk premium on TIPS','The tax advantage of TIPS over nominal bonds'],
correct:1,
hint:'TIPS adjust for inflation; nominal bonds don\'t. The difference between them reveals...',
explanation:'TIPS provide a REAL yield (inflation-adjusted). Nominal Treasury bonds provide a NOMINAL yield. The spread between them = the BREAKEVEN INFLATION RATE — the market\'s collective expectation of average future inflation. If expected inflation rises, TIPS become relatively more valuable.',
optionExplains:['Wrong. Treasury bonds are sovereign — default risk premium is negligible.','CORRECT. Nominal yield – TIPS yield = implied expected inflation (breakeven inflation rate).','Wrong. TIPS typically have LOWER liquidity than nominal Treasuries, suggesting the spread is NOT a liquidity premium on TIPS.','Wrong. Tax treatment of TIPS vs. nominal bonds is similar.'],
trap:'TIPS yield = real yield. Nominal yield = real yield + expected inflation. Spread = expected inflation.'},

// ── Q79 ──
{id:79,type:'mcq',difficulty:'medium',topic:'Pledging Requirements',page:'p.73',
text:'When a bank uses repurchase agreements (RPs) to raise funds, it must:',
options:['Buy Treasuries from the counterparty and sell them back later','Pledge some of its own securities (usually Treasuries/agencies) as collateral to receive funds at the lowest RP rate','Issue commercial paper collateralized by loan portfolios','Pay the Federal Funds Rate plus a spread to the counterparty'],
correct:1,
hint:'RP = secured borrowing. What secures it?',
explanation:'In a repo (repurchase agreement), the institution selling securities (borrowing cash) pledges those securities (typically Treasuries or agency issues) as collateral. The lowest RP rate is obtained by using the highest-quality collateral — hence the preference for Treasuries and agencies.',
optionExplains:['Wrong. In a repo, the institution SELLS securities for cash (borrowing). The reverse repo is buying.','CORRECT. RP = sell securities for cash + pledge those securities as collateral. Best rate with best collateral.','Wrong. Repos use already-held securities, not loan portfolios as collateral.','Wrong. RP rate is negotiated based on collateral quality; Fed Funds Rate + spread is for unsecured interbank lending.'],
trap:'Repos are SECURED borrowing. The institution is temporarily transferring ownership of securities in exchange for cash, with an agreement to buy them back.'},

// ── Q80 ──
{id:80,type:'truefalse',difficulty:'medium',topic:'Investment Maturity Strategies',page:'p.74',
text:'TRUE or FALSE: The Ladder (Spaced-Maturity) strategy maximizes investment income.',
correct:false,
hint:'What does the ladder explicitly sacrifice?',
explanation:'FALSE. The chapter explicitly states: "This strategy certainly does NOT maximize investment income." The ladder reduces income fluctuations, requires little expertise, and builds in flexibility as some securities always roll over into cash — but it sacrifices maximum income for stability and simplicity.',
wrongPart:'Any TRUE answer confuses stability of income with maximization of income.',
trap:'Laddering SMOOTHS and STABILIZES income — it does not maximize it. Maximum income requires concentration in longer maturities.'},

// ── Q81 ──
{id:81,type:'mcq',difficulty:'hard',topic:'Duration',page:'p.78',
text:'PO strips are SOLD AT A DISCOUNT from par. The investor\'s return comes from:',
options:['Periodic interest payments twice yearly','Price appreciation from discount to par over the life of the security','Capital gains from selling before maturity at a premium','Dividend income from the underlying mortgage pool'],
correct:1,
hint:'No coupon = return must come entirely from price appreciation.',
explanation:'Stripped securities (both PO and IO) are zero-coupon instruments sold at a discount. Return comes ENTIRELY from price appreciation as the strip approaches maturity (for POs: the lump-sum principal payment). No periodic coupon payments are made.',
optionExplains:['Wrong. Zero-coupon instruments pay NO periodic interest.','CORRECT. Discount instrument → price rises toward par (or maturity value) → price appreciation = total return.','Wrong. This would be an HPY scenario — but the FUNDAMENTAL return source is still price appreciation.','Wrong. Strips are securities, not equity interests; no dividend income.'],
trap:'All discount instruments (T-bills, PO strips, zero-coupon bonds) earn returns through price appreciation ONLY.'},

// ── Q82 ──
{id:82,type:'mcq',difficulty:'medium',topic:'Investment Maturity Strategies',page:'p.75',
text:'The Rate Expectations strategy carries greater transaction costs than other maturity strategies because it:',
options:['Uses derivatives instead of cash market instruments','May require frequent security trading and switching as rate forecasts change','Invests only in illiquid securities','Requires regulatory approval for each trade'],
correct:1,
hint:'Frequent adjustments = frequent trading costs.',
explanation:'The rate expectations strategy requires CONTINUAL portfolio shifts as interest rate forecasts are updated. Each shift involves buying and selling securities — generating broker/dealer commissions, bid-ask spreads, and potentially tax consequences. This is one of its drawbacks.',
optionExplains:['Wrong. Rate expectations strategies typically use cash market securities, not necessarily derivatives.','CORRECT. Frequent portfolio rebalancing = higher transaction costs than passive strategies like laddering.','Wrong. No specific illiquid security requirement.','Wrong. Individual bond trades don\'t require individual regulatory approval.'],
trap:'Active strategies (rate expectations) generate higher costs; passive strategies (ladder) generate lower costs.'},

// ── Q83 ──
{id:83,type:'mcq',difficulty:'hard',topic:'Yield Curve',page:'p.76',
text:'Which of the following would cause investments officers to TRADE (sell and reinvest) their security portfolios most actively?',
options:['Stable interest rates with no change in economic conditions','Prospect of significant capital gains, opportunity to reduce risk without yield loss, or ability to raise after-tax returns','All portfolio securities approaching maturity simultaneously','Federal Reserve announcement of unchanged reserve requirements'],
correct:1,
hint:'Banks trade when it improves returns, reduces risk, or manages taxes.',
explanation:'Banks trade securities most actively when: (a) tax management can boost after-tax returns, (b) locking in higher long-term yields is possible when rates are expected to fall, (c) asset quality can be improved without sacrificing much return, or (d) the portfolio can move to higher-quality securities if loan portfolio problems emerge.',
optionExplains:['Wrong. Stable conditions mean little incentive to trade.','CORRECT. The four specific catalysts for active trading: tax gains, capital gains, quality improvement, or yield enhancement.','Wrong. Maturing securities are routine rollovers, not strategic trading.','Wrong. Reserve requirement changes affect bank reserves, not strategic bond portfolio trading motivation.'],
trap:'Bond portfolio trading is not random or continuous — it is triggered by specific financial opportunities or risk management needs.'},

// ── Q84 ──
{id:84,type:'mcq',difficulty:'medium',topic:'Inflation Risk',page:'p.72',
text:'Which type of investment provides the MOST DIRECT protection against inflation risk?',
options:['Long-term fixed-rate corporate bonds','Short-term securities and those with variable interest rates','Zero-coupon Treasury strips','Long-duration government bonds'],
correct:1,
hint:'Which instruments can reprice as inflation changes?',
explanation:'Short-term securities and variable-rate instruments provide the most protection against inflation. Short-term securities mature quickly and can be rolled over at the new, higher nominal rates. Variable-rate instruments adjust their coupons automatically. Long-term fixed-rate bonds suffer the most from inflation erosion.',
optionExplains:['Wrong. Long-term fixed-rate bonds are highly vulnerable to inflation — their real value erodes.','CORRECT. Short-term rollover + variable rate repricing = best inflation protection.','Wrong. Zero-coupon strips lock in a real rate — they\'re severely harmed by unexpected inflation.','Wrong. Long-duration bonds have the GREATEST inflation risk exposure.'],
trap:'Inflation protection requires FLEXIBILITY to reprice — short maturities and variable rates provide this.'},

// ── Q85 ──
{id:85,type:'mcq',difficulty:'medium',topic:'Credit Risk',page:'p.69',
text:'Credit options and credit swaps in investment management can be used to:',
options:['Convert corporate bonds to government bonds in the portfolio','Swap an uncertain return on securities for a lower but more CERTAIN return based on a reference rate','Extend the maturity of investment holdings without buying new bonds','Reduce the coupon rate on existing bond holdings'],
correct:1,
hint:'What does a credit swap exchange for certainty?',
explanation:'Investments officers can use credit swaps to exchange an uncertain return on risky securities for a lower but MORE CERTAIN return based on a standard reference rate (like the Treasury yield). This trades upside for certainty — useful when credit risk concerns are elevated.',
optionExplains:['Wrong. Credit swaps manage risk; they don\'t change the legal nature of the underlying instrument.','CORRECT. Credit swap = trade uncertain risky return for lower certain reference-rate return.','Wrong. Maturity extension requires buying different-maturity securities.','Wrong. Credit swaps don\'t alter coupon terms of existing bonds.'],
trap:'Credit swaps sacrifice yield in exchange for certainty — a risk management trade-off, not a return-enhancement tool.'},

// ── Q86 ──
{id:86,type:'mcq',difficulty:'hard',topic:'Securitized Assets',page:'p.62',
text:'Four major factors drove popularity of asset-backed securities before the 2007-2009 crisis. Which is LEAST accurate?',
options:['Government or private guarantees provided credit enhancement','Higher average yields than most government securities','Guaranteed price stability regardless of economic conditions','Superior liquidity and marketability compared to the underlying loans themselves'],
correct:2,
hint:'What did the 2007-09 crisis reveal about ABS pricing?',
explanation:'The 2007-2009 crisis proved that ABS prices are NOT guaranteed to be stable. Market values deteriorated SHARPLY when underlying loans (mortgages) experienced surging default rates. "Price stability" was NEVER one of the stated advantages of ABS — the listed advantages were guarantees, higher yields, lack of alternatives, and better liquidity than loans.',
optionExplains:['Wrong. Government/private guarantees WAS a stated factor driving ABS popularity.','Wrong. Higher yields WAS a stated factor.','CORRECT. Price stability was NOT listed as an advantage and was disproven dramatically in 2007-09.','Wrong. Superior liquidity vs. loans WAS a stated factor.'],
trap:'The crisis revealed the false assumption of ABS stability. Price volatility on ABS can be extreme in a crisis.'},

// ── Q87 ──
{id:87,type:'truefalse',difficulty:'hard',topic:'Yield Curve',page:'p.76',
text:'TRUE or FALSE: Yield curves provide information only about current interest rates and have no predictive value for the economy.',
correct:false,
hint:'What do economists say about yield curve shape and business cycles?',
explanation:'FALSE. Yield curves convey FORWARD-LOOKING information: positively sloped = market expects rates to rise (expansion); inverted = market expects rates to fall (potential recession). The text states yield curves send signals about the current stage of the business cycle and generally rise in economic expansions and fall in recessions.',
wrongPart:'Any TRUE answer misses the yield curve\'s role as an economic leading indicator.',
trap:'The yield curve is one of the most watched economic indicators — its shape has significant predictive power for the business cycle.'},

// ── Q88 ──
{id:88,type:'mcq',difficulty:'medium',topic:'Investment Portfolio Functions',page:'p.56',
text:'Investment portfolios help STABILIZE bank earnings because:',
options:['Investment income is guaranteed and cannot fall during recessions','When loan revenues fall (e.g., in recessions), investment income may rise to partially offset the decline','Investment securities are always marked to market, smoothing reported income','Government bonds always pay higher yields than loans during downturns'],
correct:1,
hint:'Think about how bonds and loans behave differently through the economic cycle.',
explanation:'During recessions, loan demand and revenues fall. But bond yields (especially long-term) may remain relatively stable or even rise in nominal terms, providing an offsetting income stream. This countercyclical characteristic of investment income helps smooth the bank\'s total earnings over the business cycle.',
optionExplains:['Wrong. Investment income is NOT guaranteed — it fluctuates with rates.','CORRECT. Countercyclical income: when loans fall → investment income partially compensates.','Wrong. Available-for-sale securities are marked to market, creating OCI volatility, not income stability.','Wrong. Government bonds do not always yield more than loans; typically loans yield more.'],
trap:'Investment portfolios don\'t fully offset loan income swings — they PARTIALLY compensate, providing income stabilization.'},

// ── Q89 ──
{id:89,type:'mcq',difficulty:'easy',topic:'Money Market Instruments',page:'p.57',
text:'U.S. Treasury bills can be used as collateral for which of the following?',
options:['Attracting equity investors','Securing personal consumer loans','Attracting funds from other institutions (used as collateral for borrowing)','Backing employee pension obligations'],
correct:2,
hint:'One of the key advantages of T-bills listed in the chapter.',
explanation:'T-bills are widely accepted as high-quality collateral for borrowing — financial firms can use them to attract funds from other institutions. This high collateral acceptability is one of the key advantages of T-bills beyond their safety and liquidity.',
optionExplains:['Wrong. T-bills are debt instruments; they do not attract equity investors.','Wrong. Consumer loans are typically collateralized by the purchased asset (car, house), not T-bills.','CORRECT. T-bills as collateral for interbank borrowing is a key stated advantage.','Wrong. Pension obligations are backed by pension fund assets, not specifically T-bills.'],
trap:'T-bills are excellent collateral precisely because they are liquid, safe, and widely accepted.'},

// ── Q90 ──
{id:90,type:'mcq',difficulty:'hard',topic:'Capital Market Instruments',page:'p.60',
text:'Which combination of facts about municipal bonds is COMPLETELY CORRECT?',
options:['Interest is tax-exempt; capital gains are also fully tax-exempt; banks can underwrite both GO and revenue bonds','Interest on bonds funding PUBLIC projects is tax-exempt; capital gains are taxable; banks can underwrite GO bonds and (since 1999) revenue bonds','Interest is taxable; capital gains are tax-exempt; banks cannot underwrite any municipal bonds','Interest is partially exempt; all gains are tax-exempt; banks can only underwrite T-bills'],
correct:1,
hint:'Triple-check: interest exemption, capital gain treatment, bank underwriting authority.',
explanation:'(1) Interest on munis funding PUBLIC projects = federal tax-exempt. (2) Capital gains on munis = fully taxable (except discounted bonds). (3) Banks have always been able to underwrite GO bonds; the Gramm-Leach-Bliley Act (1999) extended this to revenue bonds.',
optionExplains:['Wrong. Capital gains on munis are NOT tax-exempt.','CORRECT. All three facts are correctly stated.','Wrong. Muni interest IS tax-exempt.','Wrong. Interest is fully (not partially) exempt for qualifying bonds.'],
trap:'Three separate rules for munis: interest (exempt), capital gains (taxable), bank underwriting (GO always OK; revenue OK since 1999).'},

// ── Q91 ──
{id:91,type:'mcq',difficulty:'medium',topic:'Duration',page:'p.77',
text:'Which of the following would have the LONGEST duration?',
options:['A 5-year zero-coupon bond','A 5-year 10% coupon bond','A 2-year zero-coupon bond','A 10-year 10% coupon bond'],
correct:3,
hint:'Duration depends on both maturity and coupon size. Higher coupon = shorter duration for same maturity.',
explanation:'Duration increases with maturity and decreases with coupon size. A 10-year 10% coupon bond has the longest maturity among the choices. Even though the coupon reduces duration below 10 years, it will still have longer duration than the 5-year bonds. The zero-coupon bond has duration = maturity, but the 5-year zero gives duration = 5 years vs. the 10-year coupon bond which has duration between 7-9 years typically.',
optionExplains:['Wrong. A 5-year zero has duration = 5 years exactly.','Wrong. A 5-year coupon bond has duration < 5 years (coupons pull in the weighted average).','Wrong. A 2-year zero has duration = 2 years — shortest here.','CORRECT. 10-year maturity with moderate coupon → duration ~7-9 years. Longest of the four.'],
trap:'Zero-coupon duration = maturity exactly. For coupon bonds, duration < maturity. Compare across all four carefully.'},

// ── STATE ──
const state = {};
let correctCount=0, wrongCount=0;
let visibleIds = QUESTIONS.map(q=>q.id);

// ── RENDER ──
function render(){
  const topics = [...new Set(QUESTIONS.map(q=>q.topic))].sort();
  const sel = document.getElementById('topic-select');
  sel.innerHTML = '<option value="">📂 All Topics</option>' + topics.map(t=>`<option value="${t}">${t}</option>`).join('');
  const list = document.getElementById('q-list');
  list.innerHTML = QUESTIONS.map(q=>buildCard(q)).join('');
  updateStats();
}

function buildCard(q){
  const s = state[q.id];
  const diffClass = `badge-diff-${q.difficulty}`;
  let interactiveHTML = '';
  if(q.type==='truefalse'){
    const td = s ? (s.correct ? 'correct-ans' : 'wrong-ans') : '';
    const fd = s ? (s.correct ? '' : (s.choice===false ? 'wrong-ans' : '')) : '';
    const tc = s ? (s.choice===true ? (s.correct?'correct-ans':'wrong-ans') : '') : '';
    const fc = s ? (s.choice===false ? (s.correct?'correct-ans':'wrong-ans') : '') : '';
    interactiveHTML = `<div class="tf-row">
      <button class="tf-btn true-btn ${tc}" onclick="answerTF(${q.id},true)" ${s?'disabled':''}>✅ TRUE</button>
      <button class="tf-btn false-btn ${fc}" onclick="answerTF(${q.id},false)" ${s?'disabled':''}>❌ FALSE</button>
    </div>`;
  } else {
    interactiveHTML = `<div class="options">${q.options.map((o,i)=>{
      let cls='';
      if(s){ if(i===q.correct){cls='correct-ans';} else if(i===s.choice && !s.correct){cls='wrong-ans';} else if(i!==q.correct){cls='dimmed';} }
      const letter = String.fromCharCode(65+i);
      return `<button class="opt-btn ${cls}" onclick="answerMCQ(${q.id},${i})" ${s?'disabled':''}><span class="opt-letter">${letter}</span><span class="opt-label">${o}</span></button>`;
    }).join('')}</div>`;
  }

  let hintHtml='', explainHtml='';
  if(!s){
    hintHtml=`<div style="margin-bottom:10px"><button class="hint-btn" onclick="showHint(${q.id})">💡 Hint</button><div class="hint-box" id="hint-${q.id}">${q.hint}</div></div>`;
  }
  if(s){
    const hdr = s.correct ? 'correct-h' : 'wrong-h';
    const title = s.correct ? '✅ Correct!' : '❌ Wrong';
    let optExplains='';
    if(q.type==='truefalse'){
      optExplains=`<div class="explain-section"><div class="explain-label why">◆ Wrong Part</div><div class="explain-text">${q.wrongPart||'See explanation above.'}</div></div>`;
    } else {
      optExplains=`<div class="explain-section"><div class="explain-label options-label">◆ All Options</div>${q.optionExplains.map((e,i)=>{const cl=i===q.correct?'oe-correct':'oe-wrong';return `<div class="opt-explain-item ${cl}"><strong>${String.fromCharCode(65+i)}.</strong> ${e}</div>`;}).join('')}</div>`;
    }
    explainHtml=`<div class="explain-box show"><div class="explain-header ${hdr}">${title}</div><div class="explain-body">
      <div class="explain-section"><div class="explain-label why">◆ Why</div><div class="explain-text">${q.explanation}</div></div>
      ${optExplains}
      <div class="explain-section"><div class="explain-label trap">⚠ Trap</div><div class="explain-text">${q.trap}</div></div>
    </div></div>`;
  }

  const bottomHtml = s ? `<div class="card-bottom"><div class="answered-badge ${s.correct?'ab-correct':'ab-wrong'}">${s.correct?'✅ Correct':'❌ Wrong'}</div></div>` : '';

  return `<div class="q-card ${visibleIds.includes(q.id)?'':'hidden'}" id="qcard-${q.id}">
    <div class="q-meta">
      <span class="badge badge-num">#${q.id}</span>
      <span class="badge badge-type">${q.type==='truefalse'?'T/F':'MCQ'}</span>
      <span class="badge ${diffClass}">${q.difficulty}</span>
      <span class="badge badge-topic">${q.topic}</span>
      <span class="badge badge-page">${q.page}</span>
    </div>
    <div class="q-text">${q.text}</div>
    ${hintHtml}
    ${interactiveHTML}
    ${explainHtml}
    ${bottomHtml}
  </div>`;
}

function showHint(id){ document.getElementById(`hint-${id}`).classList.toggle('show'); }

function answerMCQ(id,choice){
  if(state[id]) return;
  const q = QUESTIONS.find(x=>x.id===id);
  const correct = choice===q.correct;
  state[id]={choice,correct};
  if(correct) correctCount++; else wrongCount++;
  refreshCard(id); updateStats();
}

function answerTF(id,choice){
  if(state[id]) return;
  const q = QUESTIONS.find(x=>x.id===id);
  const correct = choice===q.correct;
  state[id]={choice,correct};
  if(correct) correctCount++; else wrongCount++;
  refreshCard(id); updateStats();
}

function refreshCard(id){
  const card = document.getElementById(`qcard-${id}`);
  const q = QUESTIONS.find(x=>x.id===id);
  if(card){ card.outerHTML = buildCard(q); }
}

function updateStats(){
  const done = correctCount+wrongCount;
  document.getElementById('sc').textContent=correctCount;
  document.getElementById('sw').textContent=wrongCount;
  document.getElementById('sq').textContent=done;
  document.getElementById('ss-c').textContent=correctCount;
  document.getElementById('ss-w').textContent=wrongCount;
  document.getElementById('ss-t').textContent=done;
  document.getElementById('progress-bar').style.width=(done/100*100)+'%';
}

function applyFilters(){
  const search = document.getElementById('search-input').value.toLowerCase();
  const topic = document.getElementById('topic-select').value;
  const diff = document.getElementById('diff-select').value;
  visibleIds=[];
  let count=0;
  QUESTIONS.forEach(q=>{
    const matchT = !topic || q.topic===topic;
    const matchD = !diff || q.difficulty===diff;
    const matchS = !search || q.text.toLowerCase().includes(search) || q.topic.toLowerCase().includes(search) || (q.options&&q.options.some(o=>o.toLowerCase().includes(search)));
    const card = document.getElementById(`qcard-${q.id}`);
    if(matchT&&matchD&&matchS){ visibleIds.push(q.id); count++; if(card)card.classList.remove('hidden'); }
    else{ if(card)card.classList.add('hidden'); }
  });
  document.getElementById('results-info').textContent = count===100?'Showing all 100 questions':`Showing ${count} of 100 questions`;
  document.getElementById('empty-state').style.display=count===0?'block':'none';
}

function clearFilters(){
  document.getElementById('search-input').value='';
  document.getElementById('topic-select').value='';
  document.getElementById('diff-select').value='';
  applyFilters();
}

function resetAll(){
  Object.keys(state).forEach(k=>delete state[k]);
  correctCount=0; wrongCount=0;
  render();
  applyFilters();
}

render();
</script>
