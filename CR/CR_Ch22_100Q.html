const ALL_QS = [

// ══════════════════════════════════════════════════════
// TOPIC 1: STRUCTURED CREDIT BASICS (Q1–14)
// ══════════════════════════════════════════════════════
{
  id:1, topic:'basics', diff:'easy', format:'Match the Pairs',
  q:'Match each structured product type to its key characteristic: (i) Covered bond (ii) Mortgage pass-through (iii) CMO (iv) Structured credit product',
  opts:['A. (i) assets stay on issuer\'s balance sheet; (ii) cash flows passed through directly; (iii) tranched by prepayment priority; (iv) tranched by credit loss priority','B. (i) assets moved off-balance sheet; (ii) rated by agencies; (iii) credit tranching; (iv) prepayment tranching','C. (i) backed by equity capital; (ii) revolving pool; (iii) static pool; (iv) managed pool','D. (i) subordination from excess spread; (ii) sequential pay; (iii) implied correlation; (iv) CDX index'],
  ans:0,
  hint:'Covered bonds stay on the bank\'s balance sheet — that is their defining feature.',
  why:'Covered bonds keep underlying assets on the issuer\'s balance sheet (not off-balance sheet). Pass-throughs directly pass cash flows from loans to bondholders. CMOs (collateralized mortgage obligations) were developed to cope with prepayment risk by creating sequential-pay tranches. Structured credit products add credit loss tranching as the key innovation.',
  opts_why:[
    {cls:'good', txt:'<span class="g">A – Correct.</span> Correctly maps each product to its defining characteristic in the text\'s hierarchy.'},
    {cls:'bad', txt:'<span class="b">B – Wrong.</span> Covered bonds do NOT move assets off-balance sheet; that is their key distinction from securitizations.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Pool types (revolving, static, managed) classify securitizations differently, not the products in the hierarchy.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> These features (excess spread, CDX) belong to later sections of the chapter, not the definitional hierarchy.'},
  ],
  trap:'Covered bonds are NOT securitizations because the assets remain ON the issuer\'s balance sheet. This is frequently tested.',
  src:'§22.1, pp.334–335'
},
{

  ans:1,

  why:'The text describes a structured product as a "robot" corporate entity with a balance sheet but no other business. It is set up as a special purpose entity (SPE) or vehicle (SPV), also known as a trust, to legally separate the structured product\'s assets and liabilities from those of the original creditors. This makes the SPE bankruptcy remote.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> A hedge fund is an investor, not the SPE structure itself.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> "Robot corporate entity" with balance sheet, no other business — the text\'s exact language for an SPE.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> A monoline insurer provides guarantees (wraps) — a separate participant, not the SPE.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> The trustee/custodian is a service provider to the SPE, not the SPE itself.'},

  trap:'Bankruptcy remoteness is the purpose of the SPE structure — it separates asset credit quality from the originator\'s credit quality.',
  src:'§22.1, p.335'
},
{

  ans:0,

  opts_why:[

{

{
  id:12, topic:'basics', diff:'hard', format:'Two-Part Analysis',
  q:'A securitization\'s weighted average life (WAL) is used in risk analysis. PART 1: What does WAL measure? PART 2: Why does standard prepayment assumption matter for WAL?',
  opts:['A. P1: Arithmetic average maturity of all loans. P2: Prepayment rates are regulated by Basel III','B. P1: Weighted average number of years each dollar of par value will remain outstanding before repaid. P2: WAL is associated with a particular prepayment assumption; different assumptions yield different WALs','C. P1: Expected maturity date of the senior bond tranche. P2: Senior bonds always prepay first in a sequential-pay structure','D. P1: Average time to default across all loans. P2: Default timing drives early amortization triggers in revolving pools'],

  hint:'WAL is a concept that captures uncertainty in when principal is returned — what drives that uncertainty?',
  why:'WAL is defined as the weighted average of the number of years each dollar of par value of the bond will remain outstanding before it is repaid or amortized. Prepayment risk means borrowers may repay early and unpredictably. WAL is therefore always associated with a particular prepayment assumption, and standard assumptions are set by convention for some asset classes. Different assumptions produce different WALs.',

  src:'§22.1, p.337'

{
  id:13, topic:'basics', diff:'hard', format:'Arrangement / Sequencing Set',
  q:'A CLO has the following characteristics: 100 loans × $1M each; coupon L+350bps; Equity $5M, Mezzanine $10M (L+500bps), Senior $85M (L+50bps); Libor = 5%. Calculate the annual excess spread assuming NO defaults.',

    {cls:'good', txt:'<span class="g">B – Correct.</span> $8.5M collateral interest − $5.675M total bond coupons = $2.825M excess spread.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> $4,675,000 is the senior bond coupon alone — not the excess spread.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> $8,500,000 is the total collateral interest, before deducting bond payments.'},

},
{
  id:14, topic:'basics', diff:'hard', format:'Ranking Puzzle',
  q:'For the CLO example (Equity $5M, Mezz $10M at L+500bps, Senior $85M at L+50bps, collateral L+350bps), rank the following from HIGHEST to LOWEST initial credit enhancement: (i) Senior bond (ii) Mezzanine bond (iii) Equity tranche',

  why:'Credit enhancement = subordination below each tranche as % of total liabilities ($100M). Equity has no credit enhancement (takes first loss) = 0%. Mezzanine is protected by the equity ($5M/$100M = 5%). Senior is protected by equity + mezzanine ($5M + $10M)/$100M = 15%. So senior = 15%, mezz = 5%, equity = 0%.',

{
  id:19, topic:'tranching', diff:'medium', format:'If-Then with Radio Buttons',

  ans:1,
  hint:'Loss absorption order: equity first, then...?',
  why:'The waterfall distributes losses bottom-up: equity first, then mezzanine (junior debt), then senior debt. The text states: "if the equity tranche is exhausted by defaults in the collateral pool, it [the junior debt/mezzanine] is next in line to suffer default losses." This is the fundamental principle of credit tranching.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Senior bond is protected by both equity AND mezzanine. It only suffers losses after both are exhausted.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> After equity is exhausted: mezzanine next. After mezzanine exhausted: senior is hit.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> The OC account supplements cash flows; it does not absorb credit writedowns in the priority structure.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Servicer advances are for payment shortfalls (cash flow), not for absorbing principal writedowns.'},
  ],
  trap:'The loss cascade is strictly: equity → mezzanine → senior. Never skip from equity directly to senior.',

},

  ans:1,

  why:'The text notes: "cash flows from any collateral pool will be larger early in the life of a structured credit product, from interest and amortization of surviving loans and recovery from defaulted loans, than later." A constant default rate applied to a shrinking pool means fewer surviving loans each year → less interest income. Even though the rate is constant, the number of performing loans falls over time.',

    {cls:'bad', txt:'<span class="b">C – Wrong.</span> OC account accumulation supplements cash available in deficit scenarios but doesn\'t mean collateral-level cash flows increase.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Recovery is 40% of par; it does NOT offset lost interest income (which was 8.5% per year).'},
  ],
  trap:'Constant DEFAULT RATE ≠ constant default count. As the pool shrinks, even a constant 5% rate generates fewer new defaults each year (5% of 80 < 5% of 100). AND interest flows decline proportionally.',

},
{

  opts:['A. P1: Risk that coupon payments cannot be made. P2: Time-tranching spreads coupon payments over time.','B. P1: Risk that at maturity, insufficient principal remains to redeem bonds unless loans can be refinanced. P2: Time-tranching retires bonds gradually through amortization, reducing the lump-sum maturity risk.','C. P1: Risk that the SPE cannot be refinanced by the originator. P2: Rating agency wrap removes the need.','D. P1: Risk that interest rates rise, increasing coupon costs. P2: Floating-rate bonds eliminate duration mismatch.'],

  why:'Refinancing risk: at the legal maturity date, if enough principal cash flows from loans haven\'t been recovered (due to defaults, prepayments, or slow amortization), there may not be enough to redeem bonds at par unless loans can be refinanced. Time-tranching creates multiple senior bonds with different WALs, retiring them gradually through amortization — reducing the concentration of principal repayment at a single terminal date.',

    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Refinancing risk relates to the underlying loan pool, not the SPE\'s own funding.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Floating rate bonds address interest rate risk; refinancing risk is about principal redemption.'},
  ],
  trap:'Refinancing risk ≠ interest rate risk. It is about whether enough principal has been recovered from the collateral by legal maturity to redeem the bonds. Time-tranching mitigates this by spreading principal repayment over time.',
  src:'§22.1, pp.336–337'
},

{

{
  id:56, topic:'cashflows', diff:'hard', format:'MCQ',
  q:'The equity tranche\'s IRR formula is: 0 = −5,000,000 + Σ(1+x)^−t × max(L_t − B − OC_t, 0) + (1+x)^−T × max(F − 100,675,000, 0). In the 7.5% default scenario, equity IRR = −92.1%. This means:',
  opts:['A. The equity investor earns −92.1% per year compounded — losing 92.1% of the $5M each year','B. The present value of equity cash flows (discounted at x = −92.1%) equals the $5M initial investment','C. Equity receives some small early cash flows but essentially loses the entire $5M investment, implying the NPV of returns is close to −$5M at market rates','D. The equity tranche generates negative cash flows in every year of the 7.5% scenario'],
  ans:2,
  hint:'What does IRR = −92.1% mean economically? Look at what cash flows equity receives in this scenario.',
  why:'In the 7.5% scenario, equity receives $395,000 at year 1 but zero for all subsequent years (including terminal). The IRR is the rate that makes the NPV of these cash flows equal the $5M initial investment. Since total cash flows = $395,000 vs. $5M invested, the IRR is deeply negative (≈ −92.1%), implying near-total loss of the investment. It is NOT a per-year compound loss rate in the traditional sense.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> IRR is not a per-year loss rate. −92.1% IRR means the single cash-flow IRR equation is satisfied at that rate — essentially total loss of principal.'},
    {cls:'bad', txt:'<span class="b">B – Wrong.</span> The IRR is the rate x that makes the present value of cash flows equal the initial investment; this is technically correct but doesn\'t capture the economic meaning.'},
    {cls:'good', txt:'<span class="g">C – Correct.</span> Equity gets ~$395K early but nothing else. Returns << $5M invested → near-total loss → deeply negative IRR.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> The equity formula is max(..., 0), so cash flows are always ≥ 0. The issue is that they\'re almost all zero.'},
  ],
  trap:'IRR near −100% = near total loss of principal. The small early payment of $395K (from year 1 excess spread) barely offsets the $5M invested. This is distinct from a per-year compounding loss rate.',
  src:'§22.2, p.343–344'
},

{
  id:57, topic:'simulation', diff:'medium', format:'MCQ',
  q:'The key advantage of the simulation/copula approach to CLO risk analysis (vs. scenario analysis) is:',
  opts:['A. It eliminates the need to model default correlation','B. It unlocks the ENTIRE probability distribution of outcomes for each tranche, incorporating default correlation rather than just specific scenarios','C. It requires fewer computational resources than scenario analysis','D. It provides exact analytical formulas for tranche losses without numerical simulation'],
  ans:1,
  hint:'What does scenario analysis miss that the simulation approach captures?',
  why:'The text states: "This simulation-based analysis of the risk of a securitization, by taking into account the default correlation, unlocks the entire distribution of outcomes, not just particular outcomes." Scenario analysis gives specific outcomes for assumed default rates but ignores correlation and the full distribution. Simulation with a copula model generates the entire loss distribution for each tranche.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> The opposite is true — the simulation approach explicitly INCORPORATES default correlation via the copula.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> Full distribution + correlation = the two key advantages over scenario analysis.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Simulation requires MORE computational resources than simple scenario analysis.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> The approach is numerical simulation, not analytical formulas.'},
  ],
  trap:'Scenario analysis = specific default counts → specific outcomes. Simulation = entire distribution → Credit VaR + probabilities. The distribution is what matters for risk management.',
  src:'§22.3, p.345'
},
{
  id:58, topic:'simulation', diff:'medium', format:'MCQ',
  q:'In the copula simulation procedure, the formula t_ni = −log[1 − Φ(z_ni)] / λ_n converts correlated normal draws to:',
  opts:['A. Loss given default amounts for each loan','B. Simulated default TIMES for each loan in each simulation thread','C. Default probabilities for each loan over the remaining life of the securitization','D. Recovery rates conditional on the systematic factor'],
  ans:1,
  hint:'What does t_ni represent in the simulation notation?',
  why:'The formula maps each element z_ni of the correlated normal matrix to a default time t_ni. The text explains: "The next step is to map each element of z to a default time t_ni." Given a hazard rate λ_n, the formula generates a simulated default time for loan n in simulation thread i. Default times are then counted against the securitization\'s 5-year term to determine in which year each loan defaults.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> LGD is assumed to be 60% (1 − recovery rate) separately; it is not generated by this formula.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> t_ni = simulated default TIME for loan n in simulation i. The formula maps correlated normals to default times via the hazard rate.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Default probability π is an INPUT parameter, not an output of this formula.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Recovery rates are fixed at 40% in the model; they are not generated by this formula.'},
  ],
  trap:'The mapping z → t converts a correlated normal draw to a default TIME. This is the key copula step — it introduces correlation into when defaults occur, not whether they occur.',
  src:'§22.3, p.346'
},
{
  id:59, topic:'simulation', diff:'medium', format:'MCQ',
  q:'In the CLO simulation, 1,000 simulation threads are used for I = 100 loans and J = 52 parameter pairs. Why does the text say we need a SEPARATE correlated normal matrix z̃ for each CORRELATION assumption but NOT for each DEFAULT PROBABILITY?',
  opts:['A. Default probability determines the z matrix; correlation determines the hazard rate λ','B. The correlated normal draws depend on the correlation structure (covariance matrix Σ); changing π changes how z maps to t (via λ) but doesn\'t require redrawing z itself','C. Different default probabilities require different dimensionality of the simulation matrix','D. Default probabilities only affect the terminal year cash flows, not the simulation draws'],
  ans:1,
  hint:'What does the covariance matrix Σ of the correlated normals depend on?',
  why:'The covariance matrix Σ depends on the pairwise correlations ρ_{m,n}. Different correlation assumptions → different Σ → different correlated normal draws z̃. But changing π only changes the hazard rate λ, which affects the MAPPING from z to default times t (via t_ni = −log[1−Φ(z_ni)]/λ), not the draws themselves. So one z̃ matrix can be reused across different π values by varying λ.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> This reverses the relationship. Correlation determines Σ → determines z. π determines λ → determines t from fixed z.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> Correlation → Σ → different z needed. π → different λ → different t from SAME z. Only ρ changes require new z draws.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> The matrix dimension is always I × N = 1,000 × 100, regardless of parameter values.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> π affects defaults in ALL years, not just the terminal year.'},
  ],
  trap:'The correlated normal z̃ depends ONLY on ρ (via Σ). Once z̃ is drawn, any π can be plugged into the mapping formula to get default times t. This is a key computational efficiency in the model.',
  src:'§22.3, p.346'
},
{
  id:60, topic:'simulation', diff:'hard', format:'MCQ',
  q:'The simulation results show that for low default probabilities (π = 0.0075), the equity IRR increases with correlation (from 33.9% at ρ=0 to 32.2% at ρ=0.90). But for high default probabilities (π = 0.0975), equity IRR also increases with correlation (from −93.8% at ρ=0 to −20.3% at ρ=0.90). What explains WHY higher correlation benefits equity in both cases?',
  opts:['A. Higher correlation reduces the expected total number of defaults, benefiting equity','B. Higher correlation increases the variance of default outcomes — in high-default scenarios, some threads have very few defaults (equity survives); the "good state" probability increases with correlation','C. Higher correlation allows equity to benefit from the senior bond\'s protection more effectively','D. Higher correlation reduces the OC account drawdowns, leaving more residual cash for equity'],
  ans:1,
  hint:'The text describes equity as behaving like a "lottery ticket" at high correlation. What does that mean?',
  why:'The text explains: "If defaults are low, the high correlation induces a higher probability of a low-default state, raising the equity note\'s value." At HIGH correlation, defaults cluster — some simulations have very many defaults (equity wiped out) but OTHERS have very few (equity receives a windfall). The U-shaped distribution means equity benefits from the "lucky" low-default simulation threads. At low correlation, some defaults occur in almost every thread, eroding equity slowly but surely. Correlation creates asymmetry — extreme good outcomes become more likely for equity.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Correlation affects the distribution of defaults, not the expected number (mean is approximately constant).'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> High correlation → U-shaped distribution → some threads have very few defaults → equity wins big in those threads → higher mean equity value.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Equity is the FIRST loss position; it doesn\'t benefit from the senior\'s protection.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> OC dynamics don\'t explain the correlation effect on equity IRR.'},
  ],
  trap:'High correlation = U-shaped outcome distribution for equity. More extreme good outcomes AND extreme bad outcomes. But equity values the good outcomes (it\'s like a long option) — so higher correlation raises expected equity value despite also increasing catastrophic scenarios.',
  src:'§22.3, pp.349–350'
},
{
  id:61, topic:'simulation', diff:'hard', format:'MCQ',
  q:'For the SENIOR bond, Table 22.3 shows that at low default rates (π = 0.0075, ρ = 0.00), the senior writedown is 0.00%. But at the same default rate with ρ = 0.90, it is 1.31%. What explains why higher correlation HURTS the senior bond at low default rates?',
  opts:['A. Higher correlation reduces the senior bond\'s credit enhancement','B. At high correlation, some simulation threads have extremely many defaults that breach even the senior attachment point — even if expected defaults are low, the tail risk is high','C. Higher correlation increases the expected default rate used in the model','D. The senior bond\'s coupon spread (L+50bps) is insufficient compensation at high correlations'],
  ans:1,
  hint:'Think about the tail of the loss distribution at high correlation — what do clustering defaults do?',
  why:'At high correlation, defaults tend to arrive in clusters. Even if the average default rate is low (1.5% annually), in some simulation threads, a correlated mass default event can send losses well past the mezzanine attachment point (15%) and into the senior tranche. This is the systematic risk: high correlation = low probability but very large loss in a bad economic state. The senior bond is exposed to this tail scenario.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Credit enhancement levels are fixed in the structure; correlation doesn\'t change the CE percentage.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> Clustered defaults at high correlation create extreme loss scenarios in a few threads, breaching the senior attachment point despite low expected defaults.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> Mean expected defaults are approximately constant; correlation affects distribution, not expectation.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Coupon spread adequacy is separate from credit loss exposure.'},
  ],
  trap:'Senior bond exposure to correlation is the key insight: while expected losses may be low, high correlation creates LOW-PROBABILITY but LARGE loss scenarios (systematic tail risk) that breach the senior attachment point.',
  src:'§22.3, pp.348–349'
},
{

  q:'Table 22.3 shows mezzanine writedown at (π = 0.0675, ρ = 0.00) = 49.86% but at (π = 0.0675, ρ = 0.90) = 39.64%. Higher correlation REDUCES mezzanine losses at high default rates. Why?',

    {cls:'bad', txt:'<span class="b">D – Wrong.</span> OC dynamics don\'t explain this correlation effect on mezzanine losses.'},
  ],
  trap:'The mezzanine is ambiguous: at low defaults it behaves like a senior bond (correlation hurts), at high defaults it behaves like equity (correlation helps). High correlation + high defaults → U-shape → fewer average losses for mezzanine.',
  src:'§22.3, pp.348–349'

{
  id:63, topic:'simulation', diff:'hard', format:'MCQ',
  q:'"Positive convexity" in the equity tranche\'s response to default rates means:',
  opts:['A. The equity value accelerates upward as defaults decrease below expected rates','B. The equity loses value rapidly as defaults first increase from a low level, but the rate of additional loss slows as defaults rise further — you "can\'t beat a dead horse"','C. The equity value is positively related to default rates at high correlation','D. The equity tranche benefits from increases in default rates at all default probability levels'],
  ans:1,
  hint:'The text uses the phrase "you can\'t beat a dead horse" to describe this.',
  why:'The text states: "At low correlations, the equity value is substantially positively convex in default rates. That is, the equity tranche loses value rapidly as default rates increase from a low level. But as default rates increase, the responsiveness of the equity value to further increases in the default rate drops off. In other words, you can\'t beat a dead horse." The equity loses value steeply at first (steep slope), then the slope flattens as equity is already largely wiped out.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Convexity in this context refers to the shape of the LOSS response, not a gain response to decreasing defaults.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> Equity has positive convexity: rapid initial losses, then diminishing marginal loss. "Can\'t beat a dead horse."'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> While equity benefits from high correlation (via U-shape), this is not what "positive convexity" means in this context.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Equity always LOSES value as defaults increase. Positive convexity describes the SHAPE of that loss, not a gain from defaults.'},
  ],
  trap:'"Positive convexity" in the equity context = the loss function is CONCAVE in default rates. First derivative is large (steep loss) at low defaults, then declines (flattens). The dead horse analogy captures this perfectly.',
  src:'§22.3, p.349'
},
{
  id:64, topic:'simulation', diff:'medium', format:'MCQ',
  q:'In the CLO simulation, the credit VaR for the equity tranche at 99% confidence FALLS as the default probability increases from π = 0.0675 to π = 0.0975. Why does VaR fall even as default risk increases?',
  opts:['A. The equity tranche becomes safer at high default rates','B. At high default rates, the expected loss on equity is already so large that the 1st percentile worst outcome is not much worse than average — the VaR (gap between expected value and worst 1% case) shrinks','C. The VaR formula is incorrect for equity tranches at high default rates','D. Higher default probabilities reduce correlation in the copula model, mechanically reducing VaR'],
  ans:1,
  hint:'Credit VaR = VaR − expected loss. What happens to this gap when expected loss is already very large?',
  why:'The text states: "The equity VaR actually falls for higher default probabilities and correlations, because the expected loss is so high at those parameter levels." Credit VaR measures the DIFFERENCE between the expected loss and the worst-case percentile loss. When expected loss is already near total (at high default rates), the additional loss in the worst 1% of scenarios is small relative to the already-large expected loss. The gap shrinks → VaR falls.',
  opts_why:[
    {cls:'bad', txt:'<span class="b">A – Wrong.</span> Equity is certainly not safer at high default rates. Its expected value is near zero.'},
    {cls:'good', txt:'<span class="g">B – Correct.</span> VaR = [par value − 1st percentile value]. When E[equity] ≈ 0, even the worst 1% case isn\'t far from the expected value → small VaR.'},
    {cls:'bad', txt:'<span class="b">C – Wrong.</span> The VaR formula is valid; the result is economically interpretable.'},
    {cls:'bad', txt:'<span class="b">D – Wrong.</span> Correlation is an independent parameter; default probability doesn\'t mechanically change ρ.'},
  ],
  trap:'Credit VaR = difference between expected loss and worst-case percentile. At near-total expected loss, the INCREMENTAL worst case is small. VaR shrinks not because risk decreases but because expected loss is already catastrophic.',
  src:'§22.3, p.351'
},

{

// ══════════════════════════════════════════════════════
// STATE & ENGINE
// ══════════════════════════════════════════════════════
const state = {
  answers: {},
  hintShown: {},
  currentQ: 0,
  activeTopic: 'all',
  filteredQs: []
};

function getFiltered() {
  return state.activeTopic === 'all'
    ? ALL_QS
    : ALL_QS.filter(q => q.topic === state.activeTopic);
}

function getStats() {
  let correct = 0, wrong = 0, done = 0;
  ALL_QS.forEach(q => {
    if (state.answers[q.id] !== undefined) {
      done++;
      if (state.answers[q.id] === q.ans) correct++;
      else wrong++;
    }
  });
  return { correct, wrong, done };
}

function updateScoreboard() {
  const { correct, wrong, done } = getStats();
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-done').textContent = done;
  const pct = done > 0 ? Math.round((correct / done) * 100) + '%' : '—';
  document.getElementById('sc-pct').textContent = pct;
  const pf = document.getElementById('progFill');
  const pl = document.getElementById('progLabel');
  if (pf) pf.style.width = (done / ALL_QS.length * 100) + '%';
  if (pl) pl.textContent = done + ' / ' + ALL_QS.length + ' answered';
}

function renderTabs() {
  const wrap = document.getElementById('tabsWrapper');
  wrap.innerHTML = TOPICS.map(t => `
    <button class="tab-btn ${t.cls} ${state.activeTopic === t.id ? 'active' : ''}"
      onclick="setTopic('${t.id}')">${t.label}</button>
  `).join('');
}

function renderAll() {
  renderTabs();
  updateScoreboard();
  renderCurrentQ();
}

function renderCurrentQ() {
  state.filteredQs = getFiltered();
  const total = state.filteredQs.length;
  if (state.currentQ >= total) state.currentQ = Math.max(0, total - 1);

  const qArea = document.getElementById('qArea');
  const rs = document.getElementById('resultScreen');

  if (total === 0) {
    qArea.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">No questions for this topic.</p>';
    document.getElementById('navCounter').textContent = '0 / 0';
    return;
  }

  rs.classList.remove('show');
  qArea.style.display = '';

  const q = state.filteredQs[state.currentQ];
  if (!q) return;

  const answered = state.answers[q.id] !== undefined;
  const selectedIdx = state.answers[q.id];
  const hintShown = state.hintShown[q.id];
  const topicColor = TOPIC_COLORS[q.topic] || 'tc1';
  const diffCls = q.diff === 'hard' ? 'diff-hard' : q.diff === 'easy' ? 'diff-easy' : 'diff-medium';
  const optLetters = ['A','B','C','D'];

  let optsHtml = q.opts.map((opt, idx) => {
    let cls = '';
    if (answered) {
      if (idx === q.ans) cls = 'correct-ans';
      else if (idx === selectedIdx) cls = 'wrong-ans';
    }
    return `
      <button class="opt-btn ${cls}"
        onclick="selectAnswer(${q.id}, ${idx})"
        ${answered ? 'disabled' : ''}>
        <span class="opt-letter">${optLetters[idx]}</span>
        <span>${opt.replace(/^[A-D]\. /, '')}</span>
      </button>`;
  }).join('');

  let hintHtml = '';
  if (!answered) {
    hintHtml = `
      <button class="hint-btn" onclick="showHint(${q.id})">💡 Hint</button>
      <div class="hint-box ${hintShown ? 'show' : ''}" id="hint-${q.id}">${q.hint}</div>
    `;
  }

  let expHtml = '';
  if (answered) {
    const isCorrect = selectedIdx === q.ans;
    const optsWhy = q.opts_why.map((ow, i) =>
      `<div class="opt-analysis ${ow.cls}">${optLetters[i]}. ${ow.txt}</div>`
    ).join('');
    expHtml = `
      <div class="explanation-box show">
        <div class="exp-header">${isCorrect ? '✅ Correct!' : '❌ Incorrect'}</div>
        <div class="exp-answer">Correct Answer: ${optLetters[q.ans]}</div>
        <div class="exp-why">${q.why}</div>
        <div style="margin-bottom:10px">${optsWhy}</div>
        <div class="trap-box">${q.trap}</div>
        <div class="source-tag">📖 Source: ${q.src}</div>
      </div>`;
  }

  qArea.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num">Q${q.id}</span>
        <span class="q-topic-badge ${topicColor}">${TOPICS.find(t=>t.id===q.topic)?.label.split(' ').slice(1).join(' ') || q.topic}</span>
        <span class="q-format-badge">${q.format}</span>
        <span class="q-diff-badge ${diffCls}">${q.diff.toUpperCase()}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options-grid">${optsHtml}</div>
      ${hintHtml}
      ${expHtml}
    </div>`;

  const nc = document.getElementById('navCounter');
  if (nc) nc.textContent = `${state.currentQ + 1} / ${total}`;
}

function selectAnswer(qId, idx) {
  if (state.answers[qId] !== undefined) return;
  state.answers[qId] = idx;
  updateScoreboard();
  renderCurrentQ();
}

function showHint(qId) {
  state.hintShown[qId] = true;
  const el = document.getElementById('hint-' + qId);
  if (el) el.classList.add('show');
}

function navigate(dir) {
  state.filteredQs = getFiltered();
  state.currentQ = Math.max(0, Math.min(state.filteredQs.length - 1, state.currentQ + dir));
  renderCurrentQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setTopic(topicId) {
  state.activeTopic = topicId;
  state.currentQ = 0;
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  state.answers = {};
  state.hintShown = {};
  state.currentQ = 0;
  state.activeTopic = 'all';
  document.getElementById('resultScreen').classList.remove('show');
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderAll();
</script>
