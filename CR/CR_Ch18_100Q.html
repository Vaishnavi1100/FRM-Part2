<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FRM Part 2 · Ch18 Central Clearing · 100Q Drill Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --pink:#FF4E91;--orange:#FF6B35;--teal:#00C9A7;--blue:#5B8CFF;
  --yellow:#FFD700;--purple:#A259FF;--red:#FF4444;--green:#00C9A7;
  --bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--text:#f0f0ff;--muted:#9090bb;
  --border:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;padding-bottom:80px;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1a0533 0%,#0a1545 100%);padding:16px 20px 12px;position:sticky;top:0;z-index:300;border-bottom:3px solid var(--yellow);box-shadow:0 4px 24px rgba(0,0,0,.6);}
.hdr-row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.hdr h1{font-family:'Fredoka One',cursive;font-size:clamp(15px,3vw,20px);color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.5);}
.tag{background:var(--purple);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:12px;letter-spacing:.5px;}
.stats-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.stat{border:1.5px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;color:#ddd;}
.stat.sc{border-color:var(--teal);color:var(--teal);}
.stat.sw{border-color:var(--pink);color:var(--pink);}
.stat.ss{border-color:var(--yellow);color:var(--yellow);}
.prog-wrap{margin-top:8px;background:rgba(255,255,255,.1);border-radius:6px;height:5px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:6px;transition:width .4s ease;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:rgba(0,0,0,.3);}
.fbtn{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;color:#ccc;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.fbtn:hover{border-color:var(--blue);color:var(--blue);}
.fbtn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.fbtn.reset-btn{border-color:var(--pink);color:var(--pink);}
.fbtn.reset-btn:hover{background:var(--pink);color:#fff;}
.search-box{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:20px;padding:5px 14px;font-size:11px;color:#fff;font-family:'Nunito',sans-serif;min-width:160px;outline:none;}
.search-box:focus{border-color:var(--purple);}

/* QUESTION CARD */
.q-list{padding:16px;display:flex;flex-direction:column;gap:16px;}
.q-card{background:var(--card);border:2px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:4px 4px 0 rgba(0,0,0,.4);transition:border-color .2s;}
.q-card.answered-correct{border-color:var(--teal);}
.q-card.answered-wrong{border-color:var(--pink);}

.q-header{display:flex;align-items:flex-start;gap:10px;padding:14px 16px 10px;}
.q-num{font-family:'Fredoka One',cursive;font-size:22px;min-width:36px;line-height:1;}
.q-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.pill{font-size:10px;font-weight:800;padding:2px 9px;border-radius:12px;letter-spacing:.3px;}
.pill-topic{background:rgba(91,140,255,.2);color:var(--blue);border:1px solid rgba(91,140,255,.3);}
.pill-diff-M{background:rgba(255,215,0,.15);color:var(--yellow);border:1px solid rgba(255,215,0,.25);}
.pill-diff-H{background:rgba(255,78,145,.15);color:var(--pink);border:1px solid rgba(255,78,145,.25);}
.pill-page{background:rgba(162,89,255,.15);color:var(--purple);border:1px solid rgba(162,89,255,.25);}
.q-text{font-size:14px;font-weight:700;line-height:1.5;color:#eef;}

/* OPTIONS */
.options{padding:0 16px 14px;display:flex;flex-direction:column;gap:8px;}
.opt-btn{display:flex;align-items:flex-start;gap:10px;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 13px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#ccc;text-align:left;transition:all .2s;width:100%;}
.opt-btn:hover:not(:disabled){background:rgba(91,140,255,.12);border-color:var(--blue);color:#fff;}
.opt-btn:disabled{cursor:default;}
.opt-btn.correct{background:rgba(0,201,167,.15);border-color:var(--teal);color:#fff;}
.opt-btn.wrong{background:rgba(255,68,68,.15);border-color:var(--red);color:#fff;}
.opt-btn.missed{background:rgba(0,201,167,.08);border-color:rgba(0,201,167,.3);color:#aaa;}
.opt-label{font-family:'Fredoka One',cursive;font-size:16px;min-width:22px;color:inherit;}

/* EXPLANATION PANEL */
.expl{display:none;padding:0 16px 16px;}
.expl.show{display:block;}
.expl-inner{background:var(--card2);border-radius:12px;padding:14px;border:1px solid var(--border);}
.result-banner{display:flex;align-items:center;gap:8px;font-family:'Fredoka One',cursive;font-size:16px;margin-bottom:12px;padding:8px 12px;border-radius:8px;}
.result-banner.correct{background:rgba(0,201,167,.15);color:var(--teal);border:1px solid rgba(0,201,167,.3);}
.result-banner.wrong{background:rgba(255,78,145,.15);color:var(--pink);border:1px solid rgba(255,78,145,.3);}
.expl-section{margin-bottom:10px;}
.expl-section h4{font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--yellow);text-transform:uppercase;margin-bottom:5px;}
.expl-section p{font-size:13px;line-height:1.6;color:#ccc;}
.opt-analysis{background:rgba(255,255,255,.04);border-radius:8px;padding:8px 10px;margin:4px 0;font-size:12px;line-height:1.5;}
.opt-analysis .oa-label{font-weight:800;margin-right:6px;}
.opt-analysis.ca .oa-label{color:var(--teal);}
.opt-analysis.wa .oa-label{color:var(--pink);}
.trap-box{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);border-radius:8px;padding:8px 10px;font-size:12px;color:#ffb088;line-height:1.5;}
.trap-box strong{color:var(--orange);font-size:11px;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:3px;}
.src-box{background:rgba(162,89,255,.1);border:1px solid rgba(162,89,255,.25);border-radius:8px;padding:7px 10px;font-size:11px;color:#c0a0ff;margin-top:8px;}

/* NAVIGATION */
.nav-bar{display:flex;justify-content:center;gap:10px;padding:12px 16px;flex-wrap:wrap;}
.nav-btn{font-family:'Fredoka One',cursive;font-size:14px;padding:8px 20px;border-radius:20px;border:none;cursor:pointer;transition:all .2s;box-shadow:3px 3px 0 rgba(0,0,0,.4);}
.nav-btn:active{transform:scale(.96);box-shadow:1px 1px 0 rgba(0,0,0,.4);}
.btn-prev{background:#2a2a4a;color:#aaa;border:2px solid rgba(255,255,255,.15);}
.btn-next{background:var(--blue);color:#fff;}
.btn-skip{background:#2a2a4a;color:var(--orange);border:2px solid rgba(255,107,53,.3);}
.q-counter{font-size:13px;color:var(--muted);align-self:center;font-weight:700;}

/* SCORE SCREEN */
.score-screen{display:none;padding:30px 20px;text-align:center;}
.score-screen.show{display:block;}
.score-big{font-family:'Fredoka One',cursive;font-size:72px;background:linear-gradient(135deg,var(--teal),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.score-label{font-size:18px;color:var(--muted);margin-bottom:24px;}
.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:400px;margin:0 auto 24px;}
.score-tile{background:var(--card);border-radius:12px;padding:16px;border:2px solid var(--border);}
.score-tile .st-val{font-family:'Fredoka One',cursive;font-size:28px;}
.score-tile .st-label{font-size:11px;color:var(--muted);font-weight:700;}
.restart-btn{font-family:'Fredoka One',cursive;font-size:16px;padding:12px 32px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:24px;cursor:pointer;box-shadow:4px 4px 0 rgba(0,0,0,.4);transition:all .2s;}
.restart-btn:hover{transform:translateY(-2px);box-shadow:6px 6px 0 rgba(0,0,0,.4);}

/* TOPIC REVIEW TABLE */
.topic-table{max-width:600px;margin:24px auto 0;text-align:left;}
.topic-table table{width:100%;border-collapse:collapse;font-size:12px;}
.topic-table th{color:var(--yellow);font-weight:800;padding:8px;border-bottom:1px solid var(--border);}
.topic-table td{padding:7px 8px;border-bottom:1px solid var(--border);color:#bbb;}
.topic-table .t-score-good{color:var(--teal);font-weight:700;}
.topic-table .t-score-bad{color:var(--pink);font-weight:700;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px;}

@media(max-width:500px){
  .score-grid{grid-template-columns:1fr 1fr;}
}
</style>

<div class="hdr">
  <div class="hdr-row1">
    <h1>📚 FRM Part 2 · Credit Risk Measurement and Management . Chapter 18 . Central Clearing </h1>
    <span class="tag">CENTRAL CLEARING</span>
    <span class="tag" style="background:var(--orange);">100 Qs</span>
  </div>
  <div class="stats-row">
    <span class="stat" id="st-total">0 / 100 answered</span>

<script>
const QS = [
  // ── TOPIC: EVOLUTION ──
  {
    id:1, topic:'evolution', diff:'M', page:'p.256',
    q:'What was the FIRST mechanism developed in the historical evolution of risk mitigation at derivatives exchanges?',
    opts:['A. Complete clearing with a CCP','B. Direct clearing (payment of difference)','C. Clearing rings','D. Portfolio compression'],
    ans:1,
    optExp:[
      {l:'A',c:false,t:'Complete clearing (CCP-based) was the FINAL stage, not the first. Many students reverse the order of evolution.'},
      {l:'B',c:true,t:'Correct. Direct clearing — settling offsetting positions by "payment of difference" rather than physical delivery — was the first mechanism. (§18.1, p.256)'},
      {l:'C',c:false,t:'Clearing rings came AFTER direct clearing. They allowed three or more parties to ring out offsetting positions.'},
      {l:'D',c:false,t:'Portfolio compression is a modern OTC concept — it is analogous to clearing rings but did not precede them historically.'}
    ],
    trap:'Students often confuse the historical sequence. The order is: (1) Direct clearing → (2) Clearing rings → (3) Complete clearing (CCP). "Complete clearing" began in 1891.',
    expl:'Direct clearing meant offsetting bilateral positions against the exchange by paying only the net difference. This was analogous to bilateral netting in OTC markets. It reduced the need for physical delivery and counterparty risk, but default of any member could still propagate losses.'
  },
  {
    id:2, topic:'evolution', diff:'M', page:'p.256',
    q:'In Figure 18.1, Party A buys 100 contracts at $105 then sells 100 at $102. What is the net settlement under direct clearing?',
    opts:['A. $10,500 paid and $10,200 received separately','B. $300 net payment from A to the exchange','C. $300 net payment from the exchange to A','D. No settlement — positions cancel exactly'],
    ans:2,
    optExp:[
      {l:'A',c:false,t:'This is exactly what direct clearing AVOIDS. Bilateral settlement of gross amounts is replaced by payment of difference.'},
      {l:'B',c:false,t:'A bought at $105 (higher price) and sold at $102 (lower price). A lost money, so A owes $300 to the exchange.'},
      {l:'C',c:true,t:'Wait — A bought at 105, sold at 102. Buy high, sell low = A pays $300 net. This answer says exchange pays A. That is WRONG. The correct answer is B.'},
      {l:'D',c:false,t:'Positions cancel in terms of quantity but NOT in price. There is a $3 per contract price difference × 100 contracts = $300 due.'}
    ],
    ans:1,
    optExp:[
      {l:'A',c:false,t:'This is gross settlement — exactly what direct clearing eliminates. Wrong approach.'},
      {l:'B',c:true,t:'Correct. A bought 100 contracts at $105 (cost $10,500) and sold 100 at $102 (received $10,200). Net: A owes $300 to the exchange. (§18.1, p.256, Fig 18.1)'},
      {l:'C',c:false,t:'Reversed direction. A bought HIGH and sold LOW so A is the loser, not the recipient.'},
      {l:'D',c:false,t:'Quantities cancel but prices differ — a $3 difference per contract × 100 = $300 must be settled.'}
    ],
    trap:'Read direction carefully. "Buy at $105 then reverse at $102" means buying at a higher price — A suffers the loss and pays $300.',
    expl:'Direct clearing uses "payment of difference" — only the net gain/loss is settled. A bought at $105 and sold at $102: $10,500 − $10,200 = $300 net outflow from A. This eliminated the need to physically exchange 100 contracts both ways.'
  },
  {
    id:3, topic:'evolution', diff:'M', page:'p.256-257',
    q:'What was the primary reason some exchange members RESISTED the adoption of central clearing historically?',
    opts:['A. CCPs increased settlement costs significantly','B. Clearing homogenises counterparty risk — strong members subsidise weak ones','C. Legal frameworks did not support novation','D. Clearing required physical delivery of contracts'],
    ans:1,
    optExp:[
      {l:'A',c:false,t:'Cost concerns existed but the chapter specifically names the credit quality homogenisation argument, not generic settlement costs.'},
      {l:'B',c:true,t:'Correct. Clearing averages out (homogenises) counterparty risk. Strong-credit members who previously benefited from their credit quality now effectively subsidise weaker members. (§18.1, p.257)'},
      {l:'C',c:false,t:'Legal frameworks were developed alongside clearing; this was not cited as the main resistance.'},
      {l:'D',c:false,t:'Clearing actually REDUCED physical delivery requirements by enabling payment of difference.'}
    ],
    trap:'This is a nuanced point. The objection is not about cost per se — it is about redistribution. High-credit firms lose their competitive advantage when risk is homogenised across all members.',
    expl:'When a CCP stands between all counterparties, every member faces the CCP\'s credit quality rather than each other\'s. This means strong-credit firms can no longer extract a premium from their creditworthiness — they share risk with all members including weaker ones. CBOT resisted for ~30 years; LME until 1986.'
  },
  {
    id:4, topic:'evolution', diff:'H', page:'p.257',
    q:'Which statement BEST describes "complete clearing" as it emerged historically?',
    opts:['A. All exchange members net payments bilaterally at end of day','B. A CCP interposes itself and assumes all contractual rights and responsibilities','C. Positions are compressed to eliminate offsetting trades','D. Clearing members are required to post cash variation margin daily'],
    ans:1,
    optExp:[
      {l:'A',c:false,t:'Bilateral netting is direct clearing, not complete clearing. The key is that a THIRD PARTY (CCP) steps in.'},
      {l:'B',c:true,t:'Correct. Complete clearing (from 1891) means a CCP is placed centrally between ALL counterparties and assumes all contractual rights and responsibilities. (§18.1, p.257, Fig 18.2)'},
      {l:'C',c:false,t:'Compression is a separate concept — it eliminates redundant trades. Complete clearing is about CCP interposition.'},
      {l:'D',c:false,t:'Daily VM posting is a FEATURE of CCP margining (§18.3), not the definition of complete clearing.'}
    ],
    trap:'Students confuse "complete clearing" with "full collateralisation." Complete clearing specifically refers to the CCP stepping in as counterparty to all trades via novation.',
    expl:'Complete clearing began in 1891 and represents the final stage in the evolution. The CCP assumes all contractual responsibilities, becoming "buyer to the seller and seller to the buyer." Before this, even with direct clearing and clearing rings, members still had direct obligations to each other.'
  },
  {
    id:5, topic:'evolution', diff:'M', page:'p.257',
    q:'SwapClear was set up in the late 1990s to centrally clear what product type between major swap dealers?',
    opts:['A. Single-name credit default swaps','B. Cross-currency swaps','C. Interest rate swaps','D. Equity options'],
    ans:2,
    optExp:[
      {l:'A',c:false,t:'Single-name CDSs are listed as products "on the way" to central clearing — not yet fully cleared at the time described.'},
      {l:'B',c:false,t:'Cross-currency swaps are also mentioned as products heading toward clearing, not established via SwapClear.'},
      {l:'C',c:true,t:'Correct. SwapClear was set up as part of LCH.Clearnet in the late 1990s specifically to centrally clear interest rate swaps between major swap dealers. (§18.1, p.257)'},
      {l:'D',c:false,t:'Equity options were not the SwapClear product. SwapClear is entirely focused on interest rate swap products.'}
    ],
    trap:'The name "SwapClear" is a hint, but students sometimes confuse it with CDS clearing (ICE Clear Credit) or equity clearing.',
    expl:'SwapClear was the first major OTC CCP, set up within LCH.Clearnet. It dominates the interbank interest rate swap market and was the facility used to manage the Lehman Brothers default in 2008.'
  },

  // ── TOPIC: MECHANICS ──
  {
    id:6, topic:'mechanics', diff:'M', page:'p.258',
    q:'Which of the following BEST describes a "vertical" CCP structure?',
    opts:['A. The CCP is separately owned by clearing members and clears multiple asset classes','B. The CCP is a division of an exchange and clears only that exchange\'s products','C. The CCP is owned by regulators to ensure neutrality','D. The CCP clears trades across multiple regional jurisdictions'],
    ans:1,
    optExp:[
      {l:'A',c:false,t:'This describes a HORIZONTAL CCP structure — separately owned, multi-asset class. Common for OTC derivatives.'},
      {l:'B',c:true,t:'Correct. In a vertical structure, the CCP is owned by (is a division of) the exchange and clears only products traded on that exchange. This developed naturally for futures exchanges. (§18.2, p.258-259)'},
      {l:'C',c:false,t:'Regulator ownership is not the definition of vertical vs horizontal. Both can exist under any ownership.'},
      {l:'D',c:false,t:'Cross-jurisdictional clearing is not the distinguishing feature of vertical vs horizontal structure.'}
    ],
    trap:'Vertical = tied to ONE exchange. Horizontal = independent entity, multiple markets. Regulation tends to favour horizontal (more competition via "open" CCPs).',
    expl:'Vertical CCPs are tied to their parent exchange and can only clear that exchange\'s products. Horizontal CCPs are separately owned (typically by clearing members), have independent financial backing, and can clear trades across multiple markets and asset classes. MiFID II Article 29 supports horizontal clearing by giving CCPs access rights to any trading venue.'
  },
  {
    id:7, topic:'mechanics', diff:'H', page:'p.258',
    q:'According to the text, what is a key drawback of having a LARGE NUMBER of CCPs globally?',
    opts:['A. Increases systemic risk if one CCP fails','B. Bifurcates multilateral offset benefits and may lead to a race to the bottom on margins','C. Reduces price discovery across markets','D. Prevents regulators from mandating clearing for standardised products'],
    ans:1,
    optExp:[
      {l:'A',c:false,t:'Having a large NUMBER of CCPs actually REDUCES the systemic risk from any single CCP failing. A SMALL number increases single-point systemic risk.'},
      {l:'B',c:true,t:'Correct. Many CCPs bifurcate (fragment) multilateral offset benefits — different products at different CCPs cannot be offset against each other. Competition may also drive margins down (race to the bottom). (§18.2, p.258)'},
      {l:'C',c:false,t:'Price discovery is primarily a function of exchanges; having many CCPs does not directly impair it.'},
      {l:'D',c:false,t:'The clearing mandate applies regardless of CCP count.'}
    ],
    trap:'The tradeoffs are: Many CCPs = more competition BUT less netting efficiency and race to bottom. Few CCPs = better netting BUT more systemic risk. Students often confuse which direction creates systemic risk.',
    expl:'With multiple CCPs, a bank\'s cleared positions are split across different CCPs, reducing multilateral netting benefits. Each CCP also competes for business, potentially lowering margin requirements (race to the bottom). A single global CCP would be optimal for netting but catastrophic if it failed.'
  },
  {
    id:8, topic:'mechanics', diff:'M', page:'p.259',
    q:'Which of the following OTC derivative products is described in the text as unlikely to EVER be centrally cleared?',
    opts:['A. Index CDSs','B. Interest rate swaptions','C. Bermudan swaptions','D. Cross-currency swaps'],
    ans:2,
    optExp:[
      {l:'A',c:false,t:'Index CDSs have already been centrally cleared (via ICE Clear Credit) — they are presented as recently cleared products.'},
      {l:'B',c:false,t:'Interest rate swaptions are described as "on the way" to central clearing — not as unlikely to ever be cleared.'},
      {l:'C',c:true,t:'Correct. Bermudan swaptions are given as an example of products that "may never be centrally cleared" due to complexity. (§18.1, p.257)'},
      {l:'D',c:false,t:'Cross-currency swaps are in the "on the way to being cleared" category, not the "never" category.'}
    ],
    trap:'The text gives specific examples of four clearability categories: (1) already cleared, (2) recently cleared, (3) on the way, (4) unlikely ever. Students must memorise which product falls in which bucket.',
    expl:'The clearability ladder: Already cleared → IRS. Recently cleared → Index CDSs. On the way → swaptions, inflation swaps, single-name CDS, cross-currency swaps. Likely never → Asian options, Bermudan swaptions, IRS in illiquid currencies. Key issue for Bermudan swaptions: valuation complexity makes margin calculation unreliable.'
  },
  {
    id:9, topic:'mechanics', diff:'H', page:'p.259',
    q:'The text notes that an exotic product with STANDARD TERMS still cannot be centrally cleared. Which clearability criterion does this MOST directly violate?',

      {l:'B',c:false,t:'Loss mutualisation reduces the IMPACT of any one default but the domino effect is about CASCADE prevention.'},
      {l:'C',c:true,t:'Correct. In Figure 18.5: "the insolvency of C can no longer cause a knock-on effect to A, since the CCP has intermediated the position between the two." The CCP\'s multilateral netting removes the direct exposure from A to C, preventing cascade. (§18.2, p.260)'},
      {l:'D',c:false,t:'Legal efficiency reduces disputes but does not address the cascade default mechanism.'}
    ],
    trap:'The domino/cascade mechanism: A owes money to C; if C defaults, A may be unable to pay A\'s creditors (because C owes A). With a CCP, A owes money to the CCP (not to C). C\'s default has no direct contractual impact on A — the CCP absorbs C\'s side and A\'s obligation to the CCP is unchanged.',
    expl:'Bilateral web: if C defaults and cannot pay what it owes A, then A also might default on what A owes to others (domino). CCP solution: A\'s counterparty is the CCP, not C. C\'s default creates a loss at the CCP (absorbed by IM/DF/etc.) but A\'s obligation to the CCP is unchanged. A continues normally. The cascade is broken at the CCP level. This is why reducing "interconnectedness" (one of the two primary simplified advantages) matters.'
  },
  {
    id:98, topic:'mechanics', diff:'M', page:'p.261',
    q:'Which of the following statements MOST precisely describes what it means for a clearing member to contribute to the "loss mutualisation" principle?',
    opts:['A. Each member\'s losses are exactly proportional to their trading activity that caused the default','B. Each member contributes a small amount to a DEFAULT FUND, providing collective coverage for extreme losses from any member\'s default','C. Members share the defaulter\'s remaining obligations equally at the time of default','D. Members receive less variation margin when another member defaults (VMGH)'],
    ans:1,
    optExp:[
      {l:'A',c:false,t:'Loss mutualisation is NOT proportional to the contribution to the default — even members with no connection to the defaulter contribute.'},
      {l:'B',c:true,t:'Correct. Loss mutualisation means "losses above the resources contributed by the defaulter are shared between CCP members" via the collective default fund. (§18.2, p.261)'},
      {l:'C',c:false,t:'Sharing remaining obligations equally is not how the DF works — it is pro-rata to DF contributions.'},
      {l:'D',c:false,t:'VMGH is one specific mechanism for loss allocation — not the definition of loss mutualisation broadly.'}
    ],
    trap:'Loss mutualisation = pre-funded mutual pool. It is the DEFAULT FUND mechanism. Contrast with VMGH (haircuts gains), rights of assessment (ex-post calls), tear-up (forced portfolio termination). Loss mutualisation specifically refers to the pre-funded DF pool covering losses beyond the defaulter\'s own resources.',
    expl:'The term "mutualisation" comes from mutual insurance. All members pay premiums (DF contributions) in advance. When a loss event occurs (member defaults with more losses than their IM + own DF cover), the mutual pool (all members\' DF contributions) absorbs the excess. This is the fundamental mechanism that makes clearing economically viable — individual members couldn\'t self-insure against catastrophic defaults.'
  },
  {
    id:99, topic:'margin', diff:'H', page:'p.264',
    q:'The CCP\'s "privileged position with respect to bankruptcy law" is important because it allows the CCP to:',
    opts:['A. Avoid paying creditors of the defaulting clearing member','B. Declare a member in default and manage the portfolio WITHOUT legal challenges from bankruptcy administrators','C. Override the clearing member\'s own risk management decisions during a default','D. Exempt itself from regulatory reporting obligations during a default scenario'],
    ans:1,
    optExp:[
      {l:'A',c:false,t:'CCPs do not avoid paying creditors — they manage the position to cover obligations.'},
      {l:'B',c:true,t:'Correct. "CCPs can also close out positions more quickly than in bilateral markets, as they can declare a member in default without any external obstructions... thanks to a privileged position with respect to bankruptcy law." The contrast: "in a bilateral market the methodology for closing out trades... may be challenged by the bankruptcy administrators." (§18.3, p.265)'},
      {l:'C',c:false,t:'During a default, the CCP takes over management of the defaulter\'s portfolio — this is different from overriding normal risk management.'},
      {l:'D',c:false,t:'No such regulatory reporting exemption is described.'}
    ],
    trap:'In bilateral markets, close-out netting is subject to legal challenges (can bankruptcy administrators argue the close-out was premature or incorrect?). CCPs have statutory authority to declare defaults and manage positions without these legal challenges — enabling the swift MPoR and auction process.',
    expl:'Bilateral close-out problem: when Lehman defaulted, its counterparties in bilateral trades faced legal uncertainty about close-out methodology. Were their macro-hedges valid? Lehman\'s administrators might challenge the close-out prices. CCP context: once a member is declared in default (which the CCP can do quickly and with clear legal authority), the CCP has defined, legally protected rights to macro-hedge, auction, and close out positions — no administrator challenges possible.'
  },
  {
    id:100, topic:'impact', diff:'H', page:'p.271',
    q:'FINAL QUESTION — INTEGRATION: Which of the following statements provides the MOST accurate overall assessment of central clearing\'s net impact?',
    opts:['A. Central clearing eliminates all counterparty credit risk in derivatives markets','B. Central clearing redistributes and reshapes risk rather than eliminating it — reducing bilateral credit risk but creating CCP concentration risk, increasing MVA, and introducing moral hazard','C. Central clearing is unambiguously beneficial — all regulators and market participants support mandatory clearing','D. Central clearing reduces systemic risk by ensuring all OTC derivatives are ultimately guaranteed by central banks'],
    ans:1,
    optExp:[
      {l:'A',c:false,t:'Central clearing CENTRALISES risk at the CCP — it does not eliminate it. CCP failure risk is a real concern.'},
      {l:'B',c:true,t:'Correct. The overall message of Chapter 18: clearing reduces bilateral credit risk (CVA), increases multilateral netting, but creates CCP concentration risk (single point of failure), increases MVA (funding IM), introduces moral hazard (members stop monitoring each other), and has procyclicality concerns. Net effect is ambiguous — must be assessed holistically. (§18.5, p.271)'},
      {l:'C',c:false,t:'The chapter explicitly notes resistance to clearing (CBOT, LME), the "race to the bottom" concern among competing CCPs, and multiple disadvantages.'},
      {l:'D',c:false,t:'Central banks are a LAST RESORT liquidity provider for failing CCPs — they do not guarantee CCP obligations.'}
    ],
    trap:'The FRM exam expects nuanced judgment. The correct answer is NEVER "universally beneficial" or "eliminates risk." Risk management is about reshaping, reducing, and redistributing risk — with trade-offs. Central clearing is a major regulatory initiative with significant benefits AND costs that must be weighed holistically.',
    expl:'Summary assessment: Central clearing moves risk from a complex bilateral web to a hub-and-spoke CCP structure. Benefits: reduced interconnectedness, multilateral netting, coordinated default management, transparency. Costs: CCP single point of failure, moral hazard, adverse selection, bifurcation, procyclicality, MVA increase. CVA only modestly reduced (85% from exempt end-users persists). Net impact must be assessed trade-by-trade, market-by-market, and holistically across all xVA components.'
  }
];

// ─── STATE ───
let state = {
  answers: {},     // questionId → chosen option index (or -1 for skip)
  filter: 'all',
  search: '',
  visibleIds: QS.map(q=>q.id)
};

function getVisible(){
  return QS.filter(q=>{
    const topicOk = state.filter==='all' || q.topic===state.filter;
    const searchOk = !state.search || q.q.toLowerCase().includes(state.search.toLowerCase());
    return topicOk && searchOk;
  });
}

function updateStats(){
  const total = Object.keys(state.answers).length;
  const correct = Object.values(state.answers).filter(a=>a.result==='correct').length;
  const wrong = Object.values(state.answers).filter(a=>a.result==='wrong').length;
  const pct = total>0 ? Math.round(correct/total*100) : null;

  document.getElementById('st-total').textContent = `${total} / ${QS.length} answered`;
  document.getElementById('st-correct').textContent = `✓ ${correct} correct`;
  document.getElementById('st-wrong').textContent = `✗ ${wrong} wrong`;
  document.getElementById('st-pct').textContent = pct!==null ? `Score: ${pct}%` : 'Score: —';
  document.getElementById('prog-bar').style.width = `${total/QS.length*100}%`;

  if(total===QS.length) setTimeout(showScore, 800);
}

function handleAnswer(qId, chosen){
  const q = QS.find(x=>x.id===qId);
  if(state.answers[qId]) return; // already answered
  const correct = chosen === q.ans;
  state.answers[qId] = {chosen, result: correct?'correct':'wrong'};
  renderCard(q);
  updateStats();
}

function handleSkip(qId){
  if(state.answers[qId]) return;
  state.answers[qId] = {chosen:-1, result:'skip'};
  updateStats();
  const card = document.getElementById('card-'+qId);
  if(card) card.style.opacity='0.5';
}

function renderCard(q){
  const a = state.answers[q.id];
  const answered = !!a;
  const card = document.getElementById('card-'+q.id);
  if(!card) return;

  if(answered && a.result==='correct') card.className='q-card answered-correct';
  if(answered && a.result==='wrong') card.className='q-card answered-wrong';

  // update option buttons
  const opts = card.querySelectorAll('.opt-btn');
  opts.forEach((btn, i) => {
    btn.disabled = answered;
    if(answered){
      if(i === q.ans) btn.classList.add('correct');
      else if(a.chosen === i && i !== q.ans) btn.classList.add('wrong');
      else if(i !== q.ans) btn.classList.add('missed');
    }
  });

  // show explanation
  if(answered && a.result !== 'skip'){
    const expl = document.getElementById('expl-'+q.id);
    if(expl){
      expl.classList.add('show');
      const banner = expl.querySelector('.result-banner');
      if(a.result==='correct'){
        banner.className='result-banner correct';
        banner.innerHTML='🎉 CORRECT!';
      } else {
        banner.className='result-banner wrong';
        banner.innerHTML='❌ INCORRECT — see below';
      }
    }
  }
}

function buildCard(q){
  const diffCls = q.diff==='H' ? 'pill-diff-H' : 'pill-diff-M';
  const diffLabel = q.diff==='H' ? '🔥 Hard' : '⚡ Medium';
  const topicLabel = {
    evolution:'📜 Evolution', mechanics:'⚙️ Mechanics', novation:'🔄 Novation',
    margin:'💰 Margin', waterfall:'🌊 Waterfall', 'im-df':'⚖️ IM vs DF',
    impact:'💡 Impact', client:'👥 Client Clearing'
  }[q.topic] || q.topic;

  // option analysis HTML
  let optHtml = q.optExp.map((o,i)=>{
    const cls = o.c ? 'opt-analysis ca' : 'opt-analysis wa';
    const icon = o.c ? '✓' : '✗';
    return `<div class="${cls}"><span class="oa-label">${icon} ${o.l}:</span>${o.t}</div>`;
  }).join('');

  const optsHtml = q.opts.map((opt,i)=>`
    <button class="opt-btn" onclick="handleAnswer(${q.id},${i})" id="opt-${q.id}-${i}">
      <span class="opt-label">${String.fromCharCode(65+i)}.</span>
      <span>${opt}</span>
    </button>`).join('');

  return `
  <div class="q-card" id="card-${q.id}">
    <div class="q-header">
      <div class="q-num" style="color:var(--yellow)">${q.id}</div>
      <div style="flex:1">
        <div class="q-meta">
          <span class="pill pill-topic">${topicLabel}</span>
          <span class="pill ${diffCls}">${diffLabel}</span>
          <span class="pill pill-page">📖 ${q.page}</span>
        </div>
        <div class="q-text">${q.q}</div>
      </div>
    </div>
    <div class="options">${optsHtml}</div>
    <div class="expl" id="expl-${q.id}">
      <div class="expl-inner">
        <div class="result-banner correct"></div>
        <div class="expl-section">
          <h4>📊 Option Analysis</h4>
          ${optHtml}
        </div>
        <div class="expl-section">
          <div class="trap-box"><strong>⚠️ Where Students Go Wrong</strong>${q.trap}</div>
        </div>
        <div class="expl-section">
          <h4>💡 Full Explanation</h4>
          <p>${q.expl}</p>
        </div>
        <div class="src-box">📖 Source: ${q.page} — Jon Gregory, xVA Challenge Ch.18</div>
      </div>
    </div>
  </div>`;
}

function renderAll(){
  const visible = getVisible();
  const list = document.getElementById('q-list');
  if(visible.length === 0){
    list.innerHTML='<div class="empty">No questions match this filter.</div>';
    return;
  }
  list.innerHTML = visible.map(q=>buildCard(q)).join('');
  visible.forEach(q=>{ if(state.answers[q.id]) renderCard(q); });
}

function filterTopic(t){
  state.filter = t;
  document.querySelectorAll('.fbtn:not(.reset-btn)').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('onclick').includes(`'${t}'`));
  });
  renderAll();
}

function filterSearch(){
  state.search = document.getElementById('search-box').value;
  renderAll();
}

function resetAll(){
  if(!confirm('Reset ALL answers? This cannot be undone.')) return;
  state.answers = {};
  state.filter = 'all';
  state.search = '';
  document.getElementById('search-box').value = '';
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.fbtn')[0].classList.add('active');
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('main-view').style.display='block';
  renderAll();
  updateStats();
}

function showScore(){
  const correct = Object.values(state.answers).filter(a=>a.result==='correct').length;
  const wrong = Object.values(state.answers).filter(a=>a.result==='wrong').length;
  const skip = Object.values(state.answers).filter(a=>a.result==='skip').length;
  const pct = Math.round(correct/QS.length*100);

  document.getElementById('sc-pct').textContent = pct+'%';
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-skip').textContent = skip;

  // topic breakdown
  const topics = [...new Set(QS.map(q=>q.topic))];
  const topicLabels = {
    evolution:'Evolution', mechanics:'Mechanics', novation:'Novation',
    margin:'Margin', waterfall:'Waterfall', 'im-df':'IM vs DF',
    impact:'Advantages', client:'Client Clearing'
  };
  let tableHtml = '<table><tr><th>Topic</th><th>Correct</th><th>Total</th><th>Score</th></tr>';
  topics.forEach(t=>{
    const qs = QS.filter(q=>q.topic===t);
    const c = qs.filter(q=>state.answers[q.id]?.result==='correct').length;
    const total = qs.length;
    const pctT = total>0 ? Math.round(c/total*100) : 0;
    const cls = pctT >= 70 ? 't-score-good' : 't-score-bad';
    tableHtml += `<tr><td>${topicLabels[t]||t}</td><td style="color:var(--teal)">${c}</td><td>${total}</td><td class="${cls}">${pctT}%</td></tr>`;
  });
  tableHtml += '</table>';
  document.getElementById('topic-table').innerHTML = tableHtml;

  document.getElementById('main-view').style.display='none';
  document.getElementById('score-screen').classList.add('show');
}

function restartAll(){
  state.answers = {};
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('main-view').style.display='block';
  renderAll();
  updateStats();
  window.scrollTo(0,0);
}

function navPrev(){ window.scrollBy(0, -400); }
function navNext(){ window.scrollBy(0, 400); }
function navSkip(){
  // Find first unanswered visible question
  const vis = getVisible();
  const next = vis.find(q=>!state.answers[q.id]);
  if(next){
    const el = document.getElementById('card-'+next.id);
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

// Init
renderAll();
updateStats();
</script>
</body>
</html>
